<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MySeries Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom Scrollbar for Horizontal List */
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Snap Scrolling */
        .snap-x {
            scroll-snap-type: x mandatory;
        }
        .snap-center {
            scroll-snap-align: center;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-backdrop {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }

        /* Glassmorphism Inputs */
        .glass-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header / Search -->
    <header class="p-4 sticky top-0 z-20 bg-[#0f0f0f]/95 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-xs font-bold" id="userAvatar">U</div>
            <h1 class="text-lg font-semibold tracking-tight">Мои Сериалы</h1>
        </div>
        <div class="relative">
            <input type="text" id="searchInput" placeholder="Найти сериал..." 
                class="w-full glass-input rounded-xl px-4 py-3 text-sm placeholder-gray-400 transition-all">
            <div id="searchResults" class="absolute top-full left-0 right-0 mt-2 bg-[#1a1a1a] border border-white/10 rounded-xl shadow-xl max-h-60 overflow-y-auto z-50 hidden">
                <!-- Search results injected here -->
            </div>
        </div>
    </header>

    <!-- Main Content: Horizontal Scroll List -->
    <main class="flex-1 overflow-y-auto pt-4 pb-20">
        <div id="emptyState" class="flex flex-col items-center justify-center h-64 text-gray-500 text-center px-6 hidden">
            <svg class="w-12 h-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <p>Список пуст. Найдите сериал в поиске сверху.</p>
        </div>

        <div id="showList" class="flex gap-4 px-4 pb-8 hide-scroll snap-x overflow-x-auto">
            <!-- Show Cards injected here -->
        </div>

        <!-- Share Section -->
        <div class="px-4 mt-4 mb-8">
            <div class="bg-gradient-to-r from-gray-900 to-gray-800 border border-white/10 rounded-2xl p-4 flex items-center justify-between">
                <div>
                    <p class="text-xs text-gray-400 uppercase tracking-wider font-bold mb-1">Ваш профиль</p>
                    <p class="text-sm text-blue-400 truncate max-w-[200px]" id="profileLinkDisplay">Загрузка...</p>
                </div>
                <button onclick="shareProfile()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-lg shadow-blue-900/20">
                    Поделиться
                </button>
            </div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-[#1a1a1a] rounded-t-3xl p-6 max-h-[90vh] overflow-y-auto slide-up border-t border-white/10">
            
            <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-6"></div>
            
            <div class="flex gap-4 mb-6">
                <div id="modalPoster" class="w-24 h-36 rounded-lg bg-gray-800 flex-shrink-0 bg-cover bg-center shadow-lg"></div>
                <div class="flex-1">
                    <h2 id="modalTitleRu" class="text-xl font-bold text-white leading-tight mb-1"></h2>
                    <p id="modalTitleEn" class="text-sm text-gray-400 mb-3"></p>
                    
                    <div class="flex items-center gap-3">
                        <div class="bg-green-500/10 text-green-400 px-2 py-1 rounded text-xs font-bold border border-green-500/20">
                            <span id="modalRatingDisplay">--</span> / 10
                        </div>
                        <button onclick="enableEditRating()" class="text-xs text-gray-400 hover:text-white underline">Изменить</button>
                    </div>
                </div>
            </div>

            <!-- Rating Input (Hidden by default) -->
            <div id="ratingInputContainer" class="mb-6 hidden bg-white/5 p-3 rounded-xl border border-white/5">
                <label class="block text-xs text-gray-400 mb-2">Ваша оценка (0-10)</label>
                <div class="flex gap-2">
                    <input type="number" id="ratingInput" step="0.01" min="0" max="10" class="glass-input w-full px-3 py-2 rounded-lg text-sm" placeholder="Например, 8.5">
                    <button onclick="saveRating()" class="bg-green-600 text-white px-4 rounded-lg text-sm font-medium">OK</button>
                </div>
            </div>

            <!-- Impressions -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-300 mb-2">Ваши впечатления</label>
                <textarea id="impressionsInput" rows="5" class="w-full glass-input rounded-xl p-4 text-sm resize-none" placeholder="Напишите здесь ваши мысли о сериале..."></textarea>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="saveImpressions()" class="flex-1 bg-white text-black py-3 rounded-xl font-semibold text-sm hover:bg-gray-200 transition-colors">
                    Сохранить
                </button>
                <button onclick="closeModal()" class="flex-1 bg-gray-800 text-white py-3 rounded-xl font-semibold text-sm hover:bg-gray-700 transition-colors">
                    Закрыть
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Mock Data & State ---
        const MOCK_DB = [
            { id: 1, ru: "Во все тяжкие", en: "Breaking Bad", color: "from-green-600 to-black" },
            { id: 2, ru: "Очень странные дела", en: "Stranger Things", color: "from-red-600 to-black" },
            { id: 3, ru: "Игра престолов", en: "Game of Thrones", color: "from-blue-900 to-black" },
            { id: 4, ru: "Черное зеркало", en: "Black Mirror", color: "from-gray-800 to-black" },
            { id: 5, ru: "Кремниевая долина", en: "Silicon Valley", color: "from-yellow-600 to-black" },
            { id: 6, ru: "Офис", en: "The Office", color: "from-orange-500 to-black" },
            { id: 7, ru: "Наследники", en: "Succession", color: "from-purple-900 to-black" },
            { id: 8, ru: "Мандалорец", en: "The Mandalorian", color: "from-red-900 to-black" }
        ];

        let state = {
            userId: localStorage.getItem('tma_user_id') || 'user_' + Math.random().toString(36).substr(2, 9),
            shows: JSON.parse(localStorage.getItem('tma_my_shows')) || [],
            currentModalShowId: null
        };

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
            
            localStorage.setItem('tma_user_id', state.userId);
            document.getElementById('userAvatar').innerText = state.userId.slice(5, 7).toUpperCase();
            document.getElementById('profileLinkDisplay').innerText = `t.me/app?startapp=${state.userId}`;
            
            renderShowList();
            setupSearch();
        });

        // --- Core Logic ---

        function saveState() {
            localStorage.setItem('tma_my_shows', JSON.stringify(state.shows));
            renderShowList();
        }

        function setupSearch() {
            const input = document.getElementById('searchInput');
            const resultsDiv = document.getElementById('searchResults');

            input.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                if (val.length < 2) {
                    resultsDiv.classList.add('hidden');
                    return;
                }

                const filtered = MOCK_DB.filter(s => 
                    s.ru.toLowerCase().includes(val) || s.en.toLowerCase().includes(val)
                );

                resultsDiv.innerHTML = '';
                if (filtered.length === 0) {
                    resultsDiv.innerHTML = '<div class="p-3 text-sm text-gray-400">Ничего не найдено</div>';
                } else {
                    filtered.forEach(show => {
                        // Check if already added
                        const exists = state.shows.find(s => s.id === show.id);
                        const btnText = exists ? 'В списке' : 'Добавить';
                        const btnClass = exists ? 'bg-gray-700 text-gray-400 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-500';
                        const disabled = exists ? 'disabled' : '';

                        const item = document.createElement('div');
                        item.className = 'flex items-center justify-between p-3 border-b border-white/5 hover:bg-white/5 transition-colors';
                        item.innerHTML = `
                            <div>
                                <div class="font-medium text-sm">${show.ru}</div>
                                <div class="text-xs text-gray-400">${show.en}</div>
                            </div>
                            <button ${disabled} onclick="addShow(${show.id})" class="px-3 py-1 rounded text-xs font-medium transition-colors ${btnClass}">
                                ${btnText}
                            </button>
                        `;
                        resultsDiv.appendChild(item);
                    });
                }
                resultsDiv.classList.remove('hidden');
            });

            // Close search on click outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.relative')) {
                    resultsDiv.classList.add('hidden');
                }
            });
        }

        function addShow(id) {
            const showData = MOCK_DB.find(s => s.id === id);
            if (!state.shows.find(s => s.id === id)) {
                state.shows.push({
                    ...showData,
                    rating: null,
                    impressions: ''
                });
                saveState();
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').classList.add('hidden');
                
                // Haptic feedback if available
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }
            }
        }

        function renderShowList() {
            const container = document.getElementById('showList');
            const emptyState = document.getElementById('emptyState');
            
            container.innerHTML = '';

            if (state.shows.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            state.shows.forEach(show => {
                const card = document.createElement('div');
                card.className = 'snap-center flex-shrink-0 w-40 bg-[#1a1a1a] rounded-xl overflow-hidden shadow-lg border border-white/5 relative group transition-transform hover:scale-[1.02]';
                
                // Generate a gradient poster based on show color
                const posterGradient = `bg-gradient-to-br ${show.color}`;
                const ratingDisplay = show.rating ? `<span class="text-yellow-400 font-bold">${show.rating.toFixed(2)}</span>` : '<span class="text-gray-500">--</span>';

                card.innerHTML = `
                    <div class="h-56 ${posterGradient} flex items-center justify-center relative">
                        <span class="text-4xl font-black text-white/20 uppercase">${show.en.substring(0, 2)}</span>
                        <div class="absolute bottom-2 right-2 bg-black/60 backdrop-blur-sm px-2 py-1 rounded text-xs font-mono border border-white/10">
                            ${ratingDisplay}
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-sm text-white truncate mb-0.5">${show.ru}</h3>
                        <p class="text-xs text-gray-400 truncate mb-3">${show.en}</p>
                        <button onclick="openModal(${show.id})" class="w-full py-2 bg-white/5 hover:bg-white/10 text-xs font-medium rounded-lg transition-colors text-center">
                            Подробнее
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- Modal Logic ---

        function openModal(id) {
            const show = state.shows.find(s => s.id === id);
            if (!show) return;

            state.currentModalShowId = id;

            // Populate Data
            document.getElementById('modalPoster').className = `w-24 h-36 rounded-lg bg-gradient-to-br ${show.color} flex-shrink-0 bg-cover bg-center shadow-lg`;
            document.getElementById('modalTitleRu').innerText = show.ru;
            document.getElementById('modalTitleEn').innerText = show.en;
            document.getElementById('modalRatingDisplay').innerText = show.rating ? show.rating.toFixed(2) : '--';
            document.getElementById('impressionsInput').value = show.impressions || '';
            
            // Reset UI states
            document.getElementById('ratingInputContainer').classList.add('hidden');
            document.getElementById('detailModal').classList.remove('hidden');
            
            if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.selectionChanged();
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            state.currentModalShowId = null;
        }

        function enableEditRating() {
            const container = document.getElementById('ratingInputContainer');
            const input = document.getElementById('ratingInput');
            const show = state.shows.find(s => s.id === state.currentModalShowId);
            
            input.value = show.rating || '';
            container.classList.remove('hidden');
        }

        function saveRating() {
            const input = document.getElementById('ratingInput');
            let val = parseFloat(input.value);
            
            if (isNaN(val) || val < 0) val = 0;
            if (val > 10) val = 10;

            const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
            if (showIndex !== -1) {
                state.shows[showIndex].rating = val;
                saveState();
                document.getElementById('modalRatingDisplay').innerText = val.toFixed(2);
                document.getElementById('ratingInputContainer').classList.add('hidden');
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            }
        }

        function saveImpressions() {
            const text = document.getElementById('impressionsInput').value;
            const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
            
            if (showIndex !== -1) {
                state.shows[showIndex].impressions = text;
                saveState();
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
                
                // Optional: Close modal or show toast
                // closeModal(); 
            }
        }

        // --- Sharing ---

        function shareProfile() {
            const link = `https://t.me/your_bot_name?startapp=${state.userId}`;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => {
                    if(window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.showAlert('Ссылка на ваш профиль скопирована!');
                    } else {
                        alert('Ссылка скопирована!');
                    }
                });
            } else {
                // Fallback
                window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Посмотри мой список сериалов!`, '_blank');
            }
        }

    </script>
</body>
</html>
