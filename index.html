<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Series Tracker</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --tg-bg: var(--tg-theme-bg-color, #fff); --tg-text: var(--tg-theme-text-color, #000); --accent: #3390ec; }
        body { font-family: sans-serif; background: var(--tg-theme-secondary-bg-color, #f4f4f5); color: var(--tg-text); margin: 0; padding-bottom: 20px; }
        
        /* Поиск */
        .search-container { position: sticky; top: 0; background: var(--tg-bg); padding: 10px; z-index: 100; border-bottom: 1px solid #ddd; }
        input { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 10px; border: 1px solid #ccc; background: var(--tg-theme-secondary-bg-color); color: var(--tg-text); }
        
        /* Результаты поиска (выпадающий список) */
        #search-results { position: absolute; width: calc(100% - 20px); background: var(--tg-bg); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 0 0 10px 10px; max-height: 300px; overflow-y: auto; display: none; }
        .result-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .result-item img { width: 40px; height: 60px; border-radius: 4px; object-fit: cover; margin-right: 12px; }
        .result-info { font-size: 14px; line-height: 1.2; }

        /* Основной список пользователя */
        .my-list { padding: 10px; }
        .card { display: flex; background: var(--tg-bg); border-radius: 12px; margin-bottom: 10px; padding: 10px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 60px; height: 90px; border-radius: 8px; object-fit: cover; }
        .card-content { flex-grow: 1; margin-left: 15px; }
        .card-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .card-sub { font-size: 12px; color: #888; }
        .card-rating { font-weight: bold; color: var(--accent); font-size: 14px; background: #eef6ff; padding: 4px 8px; border-radius: 6px; }

        /* Модальное окно */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-box { background: var(--tg-bg); margin: 20% auto; width: 85%; padding: 20px; border-radius: 15px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; padding: 8px; box-sizing: border-box; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Поиск сериалов (напр. 'Во все тяжкие')">
    <div id="search-results"></div>
</div>

<div class="my-list" id="mainList">
    <!-- Сериалы появятся здесь -->
</div>

<div id="modal">
    <div class="modal-box">
        <h3 id="mTitle"></h3>
        <label>Ваша оценка (0-10):</label>
        <input type="number" id="mRate" step="0.01" min="0" max="10">
        <textarea id="mReview" placeholder="Ваши мысли о сериале..."></textarea>
        <button class="btn" onclick="saveData()">Сохранить</button>
        <button class="btn" style="background:#888" onclick="closeModal()">Закрыть</button>
        <button class="btn" style="background:transparent; color:red" onclick="deleteItem()">Удалить из списка</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_KEY = 'ВАШ_API_КЛЮЧ'; // <--- ЗАМЕНИТЕ НА СВОЙ
    let mySeries = JSON.parse(localStorage.getItem('user_series') || '[]');
    let currentIdx = null;

    tg.ready(); tg.expand();
    render();

    // Автоматический поиск при вводе
    document.getElementById('searchInput').addEventListener('input', async (e) => {
        const query = e.target.value;
        const resBox = document.getElementById('search-results');
        if (query.length < 3) { resBox.style.display = 'none'; return; }

        try {
            const response = await fetch(`https://kinopoiskapiunofficial.tech{encodeURIComponent(query)}`, {
                headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            
            resBox.innerHTML = data.films.slice(0, 6).map(f => `
                <div class="result-item" onclick="addSeries('${f.filmId}', '${f.nameRu || f.nameEn}', '${f.nameEn || ''}', '${f.posterUrlPreview}')">
                    <img src="${f.posterUrlPreview}">
                    <div class="result-info">
                        <strong>${f.nameRu || f.nameEn}</strong><br>
                        <small>${f.year} | ${f.nameEn || ''}</small>
                    </div>
                </div>
            `).join('');
            resBox.style.display = 'block';
        } catch (e) { console.error("Ошибка API:", e); }
    });

    function addSeries(id, name, eng, poster) {
        if (!mySeries.find(s => s.id == id)) {
            mySeries.push({ id, name, eng, poster, rating: "0.00", review: "" });
            save();
        }
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('searchInput').value = '';
    }

    function render() {
        const list = document.getElementById('mainList');
        list.innerHTML = mySeries.map((s, idx) => `
            <div class="card" onclick="openModal(${idx})">
                <img src="${s.poster}">
                <div class="card-content">
                    <div class="card-title">${s.name}</div>
                    <div class="card-sub">${s.eng}</div>
                </div>
                <div class="card-rating">${s.rating}</div>
            </div>
        `).join('');
    }

    function openModal(idx) {
        currentIdx = idx;
        const s = mySeries[idx];
        document.getElementById('mTitle').innerText = s.name;
        document.getElementById('mRate').value = s.rating;
        document.getElementById('mReview').value = s.review;
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveData() {
        mySeries[currentIdx].rating = parseFloat(document.getElementById('mRate').value || 0).toFixed(2);
        mySeries[currentIdx].review = document.getElementById('mReview').value;
        save(); closeModal();
    }

    function deleteItem() {
        if(confirm("Удалить?")) { mySeries.splice(currentIdx, 1); save(); closeModal(); }
    }

    function save() {
        localStorage.setItem('user_series', JSON.stringify(mySeries));
        render();
    }
</script>
</body>
</html>
