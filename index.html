<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Series List</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Поиск -->
        <header>
            <input type="text" id="searchInput" placeholder="Поиск сериалов...">
            <div id="results" class="search-results"></div>
        </header>

        <!-- Основной список -->
        <main id="seriesList">
            <!-- Сюда будут добавляться карточки -->
        </main>
    </div>

    <!-- Модальное окно (страница сериала) -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button onclick="closeModal()">✕</button>
            <h2 id="modalTitle"></h2>
            <div class="rating-input">
                <label>Оценка (0-10):</label>
                <input type="number" id="userRating" step="0.01" min="0" max="10">
            </div>
            <textarea id="userNotes" placeholder="Ваши впечатления..."></textarea>
            <button onclick="saveDetails()">Сохранить</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
