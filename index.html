<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MySeries Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }

        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-backdrop { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }

        .glass-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.12);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .delete-btn {
            opacity: 1;
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            z-index: 20;
        }
        @media (min-width: 768px) {
            .delete-btn { opacity: 0; }
            .card-container:hover .delete-btn { opacity: 1; }
        }
        .delete-btn:active {
            transform: scale(0.9);
            background-color: rgba(220, 38, 38, 0.8) !important;
        }

        .source-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .card-poster {
            cursor: pointer;
        }

        /* Фоллбэк для постеров */
        .poster-placeholder {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .poster-placeholder svg {
            opacity: 0.3;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 sticky top-0 z-20 bg-[#0f0f0f]/95 backdrop-blur-md border-b border-white/5 shadow-lg">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-sm font-bold shadow-lg shadow-blue-900/50" id="userAvatar">U</div>
                <h1 class="text-lg font-bold tracking-tight text-white">Мои Сериалы</h1>
            </div>
            <button onclick="clearAllData()" class="text-xs text-gray-500 hover:text-red-400 transition-colors">
                Сброс
            </button>
        </div>
        
        <div class="relative">
            <input type="text" id="searchInput" placeholder="Поиск (Ведьмак, Mandalorian...)..." 
                class="w-full glass-input rounded-xl pl-4 pr-10 py-3 text-sm placeholder-gray-500 transition-all shadow-inner">
            
            <div id="searchLoader" class="absolute right-3 top-3 hidden">
                <div class="loader"></div>
            </div>

            <div id="searchResults" class="absolute top-full left-0 right-0 mt-2 bg-[#1a1a1a] border border-white/10 rounded-xl shadow-2xl max-h-64 overflow-y-auto z-50 hidden">
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pt-6 pb-24">
        
        <div id="emptyState" class="flex flex-col items-center justify-center h-64 text-gray-500 text-center px-6 hidden">
            <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <p class="text-sm">Ваш список пуст.<br>Введите название сериала в поиск сверху.</p>
        </div>

        <div id="showList" class="flex gap-4 px-4 pb-8 hide-scroll snap-x overflow-x-auto">
        </div>

        <div class="px-4 mt-2">
            <div class="bg-gradient-to-r from-gray-900 to-gray-800 border border-white/10 rounded-2xl p-4 flex items-center justify-between shadow-lg">
                <div class="overflow-hidden">
                    <p class="text-[10px] text-gray-400 uppercase tracking-wider font-bold mb-1">Ваша ссылка</p>
                    <p class="text-xs text-blue-400 truncate font-mono" id="profileLinkDisplay">Загрузка...</p>
                </div>
                <button onclick="shareProfile()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg shadow-blue-900/30">
                    Поделиться
                </button>
            </div>
        </div>
    </main>

    <!-- Модальное окно -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
        
        <div class="absolute bottom-0 left-0 right-0 bg-[#1a1a1a] rounded-t-3xl p-6 max-h-[85vh] overflow-y-auto slide-up border-t border-white/10">
            
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-6 opacity-50"></div>
            
            <div class="flex gap-5 mb-6">
                <div id="modalPosterContainer" class="w-28 h-40 rounded-xl bg-gray-800 flex-shrink-0 overflow-hidden shadow-2xl border border-white/10 poster-placeholder">
                    <img id="modalPoster" class="w-full h-full object-cover" src="" alt="Poster" onerror="showPosterPlaceholder(this)">
                </div>
                <div class="flex-1 flex flex-col justify-center">
                    <h2 id="modalTitle" class="text-xl font-bold text-white leading-tight mb-1"></h2>
                    <p id="modalStudio" class="text-sm text-gray-400 mb-4 line-clamp-2"></p>
                    
                    <div class="flex items-center gap-3 mt-auto">
                        <div class="bg-green-500/10 text-green-400 px-3 py-1.5 rounded-lg text-sm font-bold border border-green-500/20 flex items-center gap-1">
                            <span id="modalRatingDisplay">--</span> 
                            <span class="text-xs opacity-60">/ 10</span>
                        </div>
                        <button onclick="enableEditRating()" class="text-xs text-gray-400 hover:text-white underline decoration-gray-600 underline-offset-2">Оценить</button>
                    </div>
                </div>
            </div>

            <!-- Поле оценки -->
            <div id="ratingInputContainer" class="mb-6 hidden bg-white/5 p-4 rounded-xl border border-white/5">
                <label class="block text-xs text-gray-400 mb-2 font-medium">Ваша оценка</label>
                <div class="flex gap-2">
                    <input type="number" id="ratingInput" step="0.1" min="0" max="10" class="glass-input w-full px-3 py-2 rounded-lg text-sm font-mono" placeholder="0.0 - 10.0">
                    <button onclick="saveRating()" class="bg-green-600 hover:bg-green-500 text-white px-4 rounded-lg text-sm font-bold transition-colors">OK</button>
                </div>
            </div>

            <!-- Впечатления -->
            <div class="mb-24 sm:mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">Ваши впечатления</label>
                <textarea id="impressionsInput" rows="6" class="w-full glass-input rounded-xl p-4 text-sm resize-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="Напишите рецензию..."></textarea>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="saveImpressions()" class="flex-1 bg-white text-black py-3.5 rounded-xl font-bold text-sm hover:bg-gray-200 transition-colors">
                    Сохранить
                </button>
                <button onclick="closeModal()" class="flex-1 bg-gray-800 text-white py-3.5 rounded-xl font-bold text-sm hover:bg-gray-700 transition-colors">
                    Закрыть
                </button>
            </div>
        </div>
    </div>

        // --- Состояние приложения ---
        let state = {
            userId: null,
            shows: [],
            currentModalShowId: null
        };

        // --- Хранилище постеров (кэш) ---
        let posterCache = {};

        // --- Инициализация ---
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                
                const tgUser = window.Telegram.WebApp.initDataUnsafe?.user;
                if (tgUser && tgUser.id) {
                    state.userId = 'tg_' + tgUser.id;
                } else {
                    state.userId = 'web_' + Math.random().toString(36).substr(2, 9);
                }
            } else {
                state.userId = 'web_' + Math.random().toString(36).substr(2, 9);
            }
            
            loadUserData();
            
            document.getElementById('userAvatar').innerText = state.userId.slice(4, 6).toUpperCase();
            document.getElementById('profileLinkDisplay').innerText = `t.me/app?startapp=${state.userId}`;
            
            renderShowList();
            setupSearch();
        });

        function loadUserData() {
            const storageKey = `tma_shows_${state.userId}`;
            const saved = localStorage.getItem(storageKey);
            state.shows = saved ? JSON.parse(saved) : [];
        }

        function saveUserData() {
            const storageKey = `tma_shows_${state.userId}`;
            localStorage.setItem(storageKey, JSON.stringify(state.shows));
            renderShowList();
        }

        function clearAllData() {
            if(confirm('Удалить весь список сериалов?')) {
                state.shows = [];
                saveUserData();
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
                }
            }
        }

        // --- Фоллбэк для постеров ---
        function showPosterPlaceholder(img) {
            img.style.display = 'none';
            const container = img.parentElement;
            if (container) {
                container.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)';
                container.innerHTML = `
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                `;
            }
        }

        // --- Логика Поиска ---
        function setupSearch() {
            const input = document.getElementById('searchInput');
            const resultsDiv = document.getElementById('searchResults');
            const loader = document.getElementById('searchLoader');
            let timeoutId = null;

            input.addEventListener('input', (e) => {
                const val = e.target.value.trim();
                
                if (timeoutId) clearTimeout(timeoutId);

                if (val.length < 2) {
                    resultsDiv.classList.add('hidden');
                    return;
                }

                timeoutId = setTimeout(() => {
                    performSearch(val);
                }, 600);
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.relative')) {
                    resultsDiv.classList.add('hidden');
                }
            });
        }

        function transliterate(text) {
            return text.toLowerCase().split('').map(char => 
                TRANSLITERATION[char] || char
            ).join('');
        }

        async function performSearch(query) {
            const resultsDiv = document.getElementById('searchResults');
            const loader = document.getElementById('searchLoader');
            
            loader.classList.remove('hidden');
            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('hidden');

            try {
                let allResults = [];
                const seenIds = new Set();

                const searchTerms = [query];
                const lowerQuery = query.toLowerCase();

                for (const [ru, en] of Object.entries(SHOW_TRANSLATIONS)) {
                    if (lowerQuery.includes(ru)) {
                        searchTerms.push(en);
                        break;
                    }
                }

                if (/[а-яё]/i.test(query)) {
                    searchTerms.push(transliterate(query));
                }

                for (const term of searchTerms) {
                    try {
                        const tvmazeResults = await searchTVMaze(term);
                        tvmazeResults.forEach(show => {
                            if (!seenIds.has(show.id)) {
                                seenIds.add(show.id);
                                allResults.push({ ...show, source: 'TVMaze' });
                            }
                        });
                    } catch (e) {
                        console.warn('TVMaze failed:', e);
                    }

                    if (allResults.length >= 15) break;
                }

                loader.classList.add('hidden');
                resultsDiv.innerHTML = '';

                if (allResults.length === 0) {
                    resultsDiv.innerHTML = `
                        <div class="p-4 text-center text-sm text-gray-400">
                            Ничего не найдено 😔<br>
                            <span class="text-xs opacity-60">Попробуйте английское название</span>
                        </div>`;
                    return;
                }

                allResults.slice(0, 20).forEach((show, index) => {
                    const exists = state.shows.find(s => s.id === show.id);
                    
                    const posterUrl = show.posterUrl || FALLBACK_POSTER;
                    const year = show.year ? `(${show.year})` : '';

                    const btnText = exists ? 'В списке' : 'Добавить';
                    const btnClass = exists ? 'bg-gray-700 text-gray-400 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-500 shadow-lg shadow-blue-900/20';
                    const disabled = exists ? 'disabled' : '';

                    const item = document.createElement('div');
                    item.className = 'flex items-center gap-3 p-3 border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer last:border-0';
                    
                    // Картинка с обработкой ошибок
                    const img = document.createElement('img');
                    img.src = posterUrl;
                    img.className = 'w-12 h-16 rounded bg-gray-800 object-cover shadow-md flex-shrink-0';
                    img.onerror = function() {
                        this.style.display = 'none';
                        this.parentElement.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)';
                        this.parentElement.innerHTML = '<svg class="w-6 h-6 mx-auto my-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>';
                    };

                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'flex-1 min-w-0';
                    infoDiv.innerHTML = `
                        <div class="font-bold text-sm truncate text-white leading-tight mb-1">${show.title}</div>
                        <div class="text-xs text-gray-400 truncate flex items-center gap-2">
                            <span>${year}</span>
                            <span class="source-badge">${show.source}</span>
                        </div>
                    `;

                    const btn = document.createElement('button');
                    btn.disabled = disabled !== '';
                    btn.className = `px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide transition-all whitespace-nowrap ${btnClass}`;
                    btn.innerText = btnText;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        addShowFromApi(show.id, show.title, posterUrl);
                    };

                    item.appendChild(img);
                    item.appendChild(infoDiv);
                    item.appendChild(btn);
                    
                    item.onclick = (e) => {
                        if (e.target !== btn) {
                            // Можно добавить превью при клике
                        }
                    };

                    resultsDiv.appendChild(item);
                });

            } catch (error) {
                console.error('Search error:', error);
                loader.classList.add('hidden');
                resultsDiv.innerHTML = `
                    <div class="p-4 text-center text-sm">
                        <span class="text-red-400">Ошибка поиска</span><br>
                        <span class="text-xs text-gray-500">${error.message}</span>
                    </div>`;
            }
        }

        async function searchTVMaze(query) {
            const response = await fetch(
                `${TVMAZE_BASE_URL}/search/shows?q=${encodeURIComponent(query)}`
            );
            
            if (!response.ok) {
                throw new Error(`TVMaze: ${response.status}`);
            }
            
            const data = await response.json();
            
            if (!data || data.length === 0) return [];

            return data
                .filter(item => item.show && item.show.name)
                .map(item => {
                    let posterUrl = FALLBACK_POSTER;
                    if (item.show.image && item.show.image.medium) {
                        posterUrl = item.show.image.medium;
                    } else if (item.show.image && item.show.image.original) {
                        posterUrl = item.show.image.original;
                    }

                    return {
                        id: `tvmaze_${item.show.id}`,
                        title: item.show.name,
                        year: item.show.premiered ? item.show.premiered.substring(0, 4) : '',
                        posterUrl: posterUrl,
                        network: item.show.network ? item.show.network.name : '',
                        rating: item.show.rating ? item.show.rating.average : null
                    };
                });
        }

        function addShowFromApi(id, title, posterUrl) {
            if (!state.shows.find(s => s.id === id)) {
                state.shows.push({
                    id: id,
                    title: title,
                    posterUrl: posterUrl,
                    rating: null,
                    impressions: ''
                });
                saveUserData();
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').classList.add('hidden');
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }
            }
        }

        // --- Удаление сериала ---
        function removeShow(event, id) {
            event.preventDefault();
            event.stopPropagation();
            
            if(confirm('Удалить этот сериал из списка?')) {
                state.shows = state.shows.filter(s => s.id !== id);
                saveUserData();
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
                }
            }
        }

        // --- Рендеринг списка ---
        function renderShowList() {
            const container = document.getElementById('showList');
            const emptyState = document.getElementById('emptyState');
            
            container.innerHTML = '';

            if (state.shows.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            state.shows.forEach(show => {
                const card = document.createElement('div');
                card.className = 'card-container snap-center flex-shrink-0 w-36 bg-[#1a1a1a] rounded-2xl overflow-hidden shadow-lg border border-white/5 relative group transition-transform hover:scale-[1.03] active:scale-95 duration-200';
                
                const ratingDisplay = show.rating !== null && show.rating !== undefined
                    ? `<span class="text-yellow-400 font-bold text-sm">${show.rating}</span>` 
                    : '<span class="text-gray-600 font-bold text-sm">--</span>';

                const safePosterUrl = show.posterUrl || FALLBACK_POSTER;

                // Кнопка удаления
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn absolute top-2 right-2 z-20 bg-black/60 hover:bg-red-600 text-white rounded-full p-1.5 backdrop-blur-sm transition-colors border border-white/10';
                deleteBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                `;
                deleteBtn.onclick = (e) => removeShow(e, show.id);

                // Контейнер постера
                const posterContainer = document.createElement('div');
                posterContainer.className = 'h-52 bg-gray-800 relative overflow-hidden card-poster poster-placeholder';
                posterContainer.onclick = () => openModal(show.id);

                // Изображение
                const img = document.createElement('img');
                img.src = safePosterUrl;
                img.className = 'w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity';
                img.alt = show.title;
                img.onerror = () => showPosterPlaceholder(img);

                // Градиент поверх
                const gradient = document.createElement('div');
                gradient.className = 'absolute inset-0 bg-gradient-to-t from-[#1a1a1a] via-transparent to-transparent pointer-events-none';

                // Бейдж рейтинга
                const ratingBadge = document.createElement('div');
                ratingBadge.className = 'absolute bottom-3 right-3 bg-black/70 backdrop-blur-md px-2 py-1 rounded-md border border-white/10 shadow-lg pointer-events-none';
                ratingBadge.innerHTML = ratingDisplay;

                posterContainer.appendChild(img);
                posterContainer.appendChild(gradient);
                posterContainer.appendChild(ratingBadge);

                // Инфо блок
                const infoDiv = document.createElement('div');
                infoDiv.className = 'p-3';
                infoDiv.innerHTML = `
                    <h3 class="font-bold text-sm text-white leading-tight mb-1 line-clamp-2 h-10" title="${show.title}">${show.title}</h3>
                    <button onclick="openModal('${show.id}')" class="w-full py-2 bg-white/5 hover:bg-white/10 text-[10px] font-bold uppercase tracking-wide rounded-lg transition-colors text-center text-gray-300">
                        Открыть
                    </button>
                `;

                card.appendChild(deleteBtn);
                card.appendChild(posterContainer);
                card.appendChild(infoDiv);
                container.appendChild(card);
            });
        }

        // --- Модальное окно ---
        function openModal(id) {
            const show = state.shows.find(s => s.id === id);
            if (!show) {
                console.error('Show not found:', id);
                return;
            }

            state.currentModalShowId = id;

            const posterImg = document.getElementById('modalPoster');
            const posterContainer = document.getElementById('modalPosterContainer');
            
            posterImg.src = show.posterUrl || FALLBACK_POSTER;
            posterImg.style.display = 'block';
            posterContainer.style.background = '';
            
            // Восстанавливаем контейнер если был заменён
            if (!posterContainer.contains(posterImg)) {
                posterContainer.innerHTML = '';
                posterContainer.appendChild(posterImg);
            }
            
            posterImg.onerror = () => showPosterPlaceholder(posterImg);
            
            document.getElementById('modalTitle').innerText = show.title;
            document.getElementById('modalStudio').innerText = 'Сериал';
            document.getElementById('modalRatingDisplay').innerText = (show.rating !== null && show.rating !== undefined) ? show.rating : '--';
            document.getElementById('impressionsInput').value = show.impressions || '';
            
            document.getElementById('ratingInputContainer').classList.add('hidden');
            document.getElementById('detailModal').classList.remove('hidden');
            
            if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.selectionChanged();
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            state.currentModalShowId = null;
        }

        function enableEditRating() {
            const container = document.getElementById('ratingInputContainer');
            const input = document.getElementById('ratingInput');
            const show = state.shows.find(s => s.id === state.currentModalShowId);
            
            input.value = show.rating !== null && show.rating !== undefined ? show.rating : '';
            container.classList.remove('hidden');
            input.focus();
        }

        function saveRating() {
            const input = document.getElementById('ratingInput');
            let val = parseFloat(input.value);
            
            if (isNaN(val)) val = 0;
            if (val < 0) val = 0;
            if (val > 10) val = 10;

            val = Math.round(val * 10) / 10;

            const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
            if (showIndex !== -1) {
                state.shows[showIndex].rating = val;
                saveUserData();
                document.getElementById('modalRatingDisplay').innerText = val;
                document.getElementById('ratingInputContainer').classList.add('hidden');
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            }
        }

        function saveImpressions() {
            const text = document.getElementById('impressionsInput').value;
            const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
            
            if (showIndex !== -1) {
                state.shows[showIndex].impressions = text;
                saveUserData();
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            }
        }

        function shareProfile() {
            const link = `https://t.me/your_bot_name?startapp=${state.userId}`;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => {
                    if(window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.showAlert('Ссылка скопирована!');
                    } else {
                        alert('Ссылка скопирована!');
                    }
                });
            } else {
                window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Зацени мой список сериалов!`, '_blank');
            }
        }
    </script>
</body>
</html>
