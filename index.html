<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Series Tracker</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --tg-bg: var(--tg-theme-bg-color, #ffffff); --tg-text: var(--tg-theme-text-color, #000); --accent: #3390ec; --secondary: var(--tg-theme-secondary-bg-color, #f4f4f5); }
        body { font-family: -apple-system, sans-serif; background: var(--secondary); color: var(--tg-text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Поисковая строка с лупой */
        .search-container { position: sticky; top: 0; background: var(--tg-bg); padding: 12px; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; }
        .search-wrapper { position: relative; width: 100%; }
        .search-wrapper span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #888; }
        input#q { width: 100%; box-sizing: border-box; padding: 12px 12px 12px 40px; border-radius: 12px; border: 1px solid #ccc; background: var(--secondary); color: var(--tg-text); font-size: 16px; outline: none; }
        
        /* Результаты поиска */
        #results { position: absolute; width: 100%; background: var(--tg-bg); box-shadow: 0 10px 25px rgba(0,0,0,0.15); border-radius: 0 0 16px 16px; max-height: 350px; overflow-y: auto; display: none; margin-top: 5px; }
        .res-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .res-item:active { background: var(--secondary); }
        .res-item img { width: 45px; height: 65px; border-radius: 6px; object-fit: cover; margin-right: 15px; background: #ddd; }
        
        /* Список */
        .my-list { padding: 12px; }
        .card { display: flex; background: var(--tg-bg); border-radius: 16px; margin-bottom: 12px; padding: 12px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card img { width: 70px; height: 100px; border-radius: 10px; object-fit: cover; }
        .card-info { flex-grow: 1; margin: 0 15px; }
        .card-title { font-weight: bold; font-size: 17px; }
        .card-rating { font-weight: 800; color: var(--accent); margin-top: 5px; }

        /* Модалка */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--tg-bg); margin: 15vh auto; width: 88%; padding: 24px; border-radius: 24px; box-sizing: border-box; }
        textarea { width: 100%; height: 100px; margin: 15px 0; border-radius: 12px; border: 1px solid #ddd; padding: 12px; box-sizing: border-box; font-family: inherit; font-size: 15px; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="search-container">
    <div class="search-wrapper">
        <span>🔍</span>
        <input type="search" id="q" placeholder="Поиск (английское название)..." autocomplete="off" enterkeyhint="search">
    </div>
    <div id="results"></div>
</div>

<div class="my-list" id="list"></div>

<div id="modal">
    <div class="modal-content">
        <h2 id="mT" style="margin:0"></h2>
        <p style="color:#888; margin: 5px 0 15px 0">Оценка и отзыв</p>
        <input type="number" id="mR" step="0.01" min="0" max="10" placeholder="Оценка (0-10)">
        <textarea id="mE" placeholder="Напишите ваши впечатления..."></textarea>
        <button class="btn" onclick="save()">Сохранить</button>
        <button class="btn" style="background:#eee; color:#000" onclick="closeM()">Отмена</button>
        <button class="btn" style="background:transparent; color:#ff3b30; font-size:14px" onclick="del()">Удалить из списка</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let myS = JSON.parse(localStorage.getItem('user_series_list') || '[]');
    let curIdx = null;

    tg.ready();
    tg.expand();
    render();

    const searchInput = document.getElementById('q');
    const resultsDiv = document.getElementById('results');

    // Функция самого поиска
    async function performSearch() {
        const query = searchInput.value.trim();
        if (query.length < 2) return;

        resultsDiv.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">Загрузка...</div>';
        resultsDiv.style.display = 'block';

        try {
            const response = await fetch(`https://api.tvmaze.com{encodeURIComponent(query)}`);
            const data = await response.json();
            
            if (data.length > 0) {
                resultsDiv.innerHTML = data.map(item => {
                    const s = item.show;
                    const img = s.image ? s.image.medium : 'https://via.placeholder.com';
                    return `
                        <div class="res-item" onclick="addItem('${s.id}', '${s.name.replace(/'/g, "")}', '${img}')">
                            <img src="${img}">
                            <div><strong>${s.name}</strong><br><small>${s.premiered ? s.premiered.split('-')[0] : '—'}</small></div>
                        </div>
                    `;
                }).join('');
            } else {
                resultsDiv.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">Ничего не найдено</div>';
            }
        } catch (e) {
            resultsDiv.innerHTML = '<div style="padding:20px; text-align:center; color:red;">Ошибка сети</div>';
        }
    }

    // Поиск при вводе
    searchInput.addEventListener('input', debounce(performSearch, 500));

    // Поиск по кнопке "Enter" на клавиатуре
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            performSearch();
            searchInput.blur(); // Скрыть клавиатуру
        }
    });

    function debounce(func, timeout = 300) {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
        };
    }

    function addItem(id, name, img) {
        if (!myS.find(x => x.id == id)) {
            myS.push({ id, name, img, rating: "0.00", review: "" });
            localStorage.setItem('user_series_list', JSON.stringify(myS));
            render();
        }
        resultsDiv.style.display = 'none';
        searchInput.value = '';
    }

    function render() {
        const container = document.getElementById('list');
        if (myS.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#888; margin-top:100px;">Пока пусто.<br>Введите название сериала в поиске 🔍</div>';
            return;
        }
        container.innerHTML = myS.map((s, i) => `
            <div class="card" onclick="openM(${i})">
                <img src="${s.img}">
                <div class="card-info">
                    <div class="card-title">${s.name}</div>
                    <div class="card-rating">★ ${s.rating}</div>
                </div>
            </div>
        `).join('');
    }

    function openM(i) {
        curIdx = i;
        const s = myS[i];
        document.getElementById('mT').innerText = s.name;
        document.getElementById('mR').value = s.rating;
        document.getElementById('mE').value = s.review;
        document.getElementById('modal').style.display = 'block';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function save() {
        const val = parseFloat(document.getElementById('mR').value || 0).toFixed(2);
        myS[curIdx].rating = val;
        myS[curIdx].review = document.getElementById('mE').value;
        localStorage.setItem('user_series_list', JSON.stringify(myS));
        render();
        closeM();
    }

    function del() {
        if(confirm('Удалить этот сериал?')) {
            myS.splice(curIdx, 1);
            localStorage.setItem('user_series_list', JSON.stringify(myS));
            render();
            closeM();
        }
    }

    // Закрытие поиска при клике вне его
    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) {
            resultsDiv.style.display = 'none';
        }
    });
</script>
</body>
</html>
