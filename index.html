<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MySeries Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-backdrop { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }

        .glass-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.12);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .delete-btn {
            opacity: 1;
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
        }
        .delete-btn:active {
            transform: scale(0.9);
            background-color: rgba(220, 38, 38, 0.8) !important;
        }

        .poster-container {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            border-radius: 12px;
            width: 100px;
            height: 140px;
        }
        .poster-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, #1a1a2e 25%, #16213e 25%, #16213e 50%, #1a1a2e 50%, #1a1a2e 75%, #16213e 75%, #16213e 100%);
            background-size: 20px 20px;
            opacity: 0.3;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(0); }
            100% { transform: translateX(20px); }
        }

        .poster-img {
            transition: opacity 0.3s ease;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .poster-img.loading { opacity: 0.5; }
        .poster-img.loaded { opacity: 1; }

        /* Рейтинг бейдж */
        .rating-badge {
            min-width: 44px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
        }
        .rating-high { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .rating-med { background: rgba(234, 179, 8, 0.2); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3); }
        .rating-low { background: rgba(107, 114, 128, 0.2); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.3); }
        .rating-none { background: rgba(255, 255, 255, 0.05); color: #6b7280; border: 1px solid rgba(255, 255, 255, 0.1); }

        /* Анимация добавления/удаления */
        .list-item {
            transition: all 0.3s ease;
        }
        .list-item.removing {
            transform: translateX(-100%);
            opacity: 0;
        }
        .list-item.adding {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Мета-информация (годы, серии) */
        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .meta-tag {
            font-size: 11px;
            color: #9ca3af;
            background: rgba(255, 255, 255, 0.08);
            padding: 3px 8px;
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .meta-tag svg {
            width: 11px;
            height: 11px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        /* Оригинальное название */
        .original-title {
            font-size: 11px;
            color: #6b7280;
            font-weight: 400;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Карточка - ГИБКАЯ вёрстка для мобильных */
        .list-item {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
        }
        .list-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Центральная колонка с информацией */
        .info-column {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 2px;
        }

        /* Название сериала */
        .show-title {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 4px;
            word-break: break-word;
        }

        /* Правая колонка с рейтингом */
        .right-column {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
            padding-left: 8px;
        }
    </style>
</head>

        let state = {
            userId: null,
            shows: [],
            currentModalShowId: null
        };

        document.addEventListener('DOMContentLoaded', () => {
            cleanImageCache();

            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                
                const tgUser = window.Telegram.WebApp.initDataUnsafe?.user;
                if (tgUser && tgUser.id) {
                    state.userId = 'tg_' + tgUser.id;
                } else {
                    state.userId = 'web_' + Math.random().toString(36).substr(2, 9);
                }
            } else {
                state.userId = 'web_' + Math.random().toString(36).substr(2, 9);
            }
            
            loadUserData();
            
            document.getElementById('userAvatar').innerText = state.userId.slice(4, 6).toUpperCase();
            document.getElementById('profileLinkDisplay').innerText = `t.me/app?startapp=${state.userId}`;
            
            renderShowList();
            setupSearch();
        });

        function getCachedImage(url) {
            try {
                const cache = JSON.parse(localStorage.getItem(IMAGE_CACHE_KEY) || '{}');
                const cached = cache[url];
                if (cached && Date.now() - cached.timestamp < IMAGE_CACHE_EXPIRY) {
                    return cached.url;
                }
            } catch (e) { console.warn('Cache read error:', e); }
            return null;
        }

        function cacheImage(originalUrl, optimizedUrl) {
            try {
                const cache = JSON.parse(localStorage.getItem(IMAGE_CACHE_KEY) || '{}');
                cache[originalUrl] = { url: optimizedUrl, timestamp: Date.now() };
                const keys = Object.keys(cache);
                if (keys.length > 100) {
                    keys.slice(0, keys.length - 100).forEach(key => delete cache[key]);
                }
                localStorage.setItem(IMAGE_CACHE_KEY, JSON.stringify(cache));
            } catch (e) { console.warn('Cache write error:', e); }
        }

        function cleanImageCache() {
            try {
                const cache = JSON.parse(localStorage.getItem(IMAGE_CACHE_KEY) || '{}');
                const now = Date.now();
                Object.keys(cache).forEach(key => {
                    if (now - cache[key].timestamp > IMAGE_CACHE_EXPIRY) {
                        delete cache[key];
                    }
                });
                localStorage.setItem(IMAGE_CACHE_KEY, JSON.stringify(cache));
            } catch (e) { console.warn('Cache clean error:', e); }
        }

        function optimizeImageUrl(url) {
            if (!url || url.includes('placeholder')) return url;
            
            const cached = getCachedImage(url);
            if (cached) return cached;

            let optimized = url;
            
            if (url.includes('tvmaze.com')) {
                optimized = url.replace('/original/', '/medium/');
            } else if (url.includes('imdb.com') || url.includes('omdbapi.com')) {
                optimized = url.replace('_V1_.jpg', '_V1_SX300.jpg');
            }
            
            optimized = optimized.replace('.png', '.jpg');
            
            if (optimized !== url) {
                cacheImage(url, optimized);
            }
            
            return optimized;
        }

        function loadUserData() {
            const storageKey = `tma_shows_${state.userId}`;
            const saved = localStorage.getItem(storageKey);
            state.shows = saved ? JSON.parse(saved) : [];
        }

        function saveUserData() {
            const storageKey = `tma_shows_${state.userId}`;
            localStorage.setItem(storageKey, JSON.stringify(state.shows));
            renderShowList();
        }

        function clearAllData() {
            if(confirm('Удалить весь список сериалов?')) {
                state.shows = [];
                saveUserData();
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
                }
            }
        }

        function setupSearch() {
            const input = document.getElementById('searchInput');
            const resultsDiv = document.getElementById('searchResults');
            const loader = document.getElementById('searchLoader');
            let timeoutId = null;

            input.addEventListener('input', (e) => {
                const val = e.target.value.trim();
                
                if (timeoutId) clearTimeout(timeoutId);

                if (val.length < 2) {
                    resultsDiv.classList.add('hidden');
                    return;
                }

                timeoutId = setTimeout(() => {
                    performSearch(val);
                }, 600);
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.relative')) {
                    resultsDiv.classList.add('hidden');
                }
            });
        }

        function transliterate(text) {
            return text.toLowerCase().split('').map(char => 
                TRANSLITERATION[char] || char
            ).join('');
        }

        function isRussian(text) {
            return /[а-яё]/i.test(text);
        }

        async function performSearch(query) {
            const resultsDiv = document.getElementById('searchResults');
            const loader = document.getElementById('searchLoader');
            
            loader.classList.remove('hidden');
            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('hidden');

            try {
                let allResults = [];
                const seenIds = new Set();

                const searchTerms = [query];
                const lowerQuery = query.toLowerCase();

                for (const [ru, en] of Object.entries(SHOW_TRANSLATIONS)) {
                    if (lowerQuery.includes(ru)) {
                        searchTerms.push(en);
                        break;
                    }
                }

                if (isRussian(query)) {
                    searchTerms.push(transliterate(query));
                }

                for (const term of searchTerms) {
                    try {
                        const tvmazeResults = await searchTVMaze(term);
                        tvmazeResults.forEach(show => {
                            if (!seenIds.has(show.id)) {
                                seenIds.add(show.id);
                                allResults.push({ ...show, source: 'TVMaze' });
                            }
                        });
                    } catch (e) {
                        console.warn('TVMaze failed:', e);
                    }

                    if (allResults.length >= 15) break;
                }

                if (allResults.length < 5) {
                    try {
                        const omdbResults = await searchOMDb(query);
                        omdbResults.forEach(show => {
                            if (!seenIds.has(show.id)) {
                                seenIds.add(show.id);
                                allResults.push({ ...show, source: 'OMDb' });
                            }
                        });
                    } catch (e) {
                        console.warn('OMDb failed:', e);
                    }
                }

                loader.classList.add('hidden');
                resultsDiv.innerHTML = '';

                if (allResults.length === 0) {
                    resultsDiv.innerHTML = `
                        <div class="p-4 text-center text-sm text-gray-400">
                            Ничего не найдено 😔<br>
                            <span class="text-xs opacity-60">Попробуйте английское название</span>
                        </div>`;
                    return;
                }

                allResults.slice(0, 20).forEach(show => {
                    const exists = state.shows.find(s => s.id === show.id);
                    
                    const posterUrl = optimizeImageUrl(show.posterUrl);
                    const year = show.year ? `(${show.year})` : '';

                    const btnText = exists ? 'В списке' : 'Добавить';
                    const btnClass = exists ? 'bg-gray-700 text-gray-400 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-500 shadow-lg shadow-blue-900/20';
                    const disabled = exists ? 'disabled' : '';

                    const item = document.createElement('div');
                    item.className = 'flex items-center gap-3 p-3 border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer last:border-0';
                    item.innerHTML = `
                        <div class="poster-container w-12 h-16 flex-shrink-0">
                            <img src="${posterUrl}" class="w-full h-full object-cover poster-img" loading="lazy" onload="this.classList.add('loaded'); this.classList.remove('loading');" onerror="this.src='https://via.placeholder.com/150x220?text=Error'; this.classList.add('loaded');">
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-sm text-white leading-tight mb-1">${show.title}</div>
                            <div class="text-xs text-gray-400 flex items-center gap-2">
                                <span>${year}</span>
                                <span class="source-badge">${show.source}</span>
                            </div>
                        </div>
                        <button ${disabled} onclick="addShowFromApi('${show.id}', '${show.title.replace(/'/g, "\\'")}', '${show.originalTitle ? show.originalTitle.replace(/'/g, "\\'") : ''}', '${posterUrl}')" class="px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide transition-all whitespace-nowrap ${btnClass}">
                            ${btnText}
                        </button>
                    `;
                    resultsDiv.appendChild(item);
                });

            } catch (error) {
                console.error('Search error:', error);
                loader.classList.add('hidden');
                resultsDiv.innerHTML = `
                    <div class="p-4 text-center text-sm">
                        <span class="text-red-400">Ошибка поиска</span><br>
                        <span class="text-xs text-gray-500">${error.message}</span>
                    </div>`;
            }
        }

        async function searchTVMaze(query) {
            const response = await fetch(`${TVMAZE_BASE_URL}/search/shows?q=${encodeURIComponent(query)}`);
            
            if (!response.ok) throw new Error(`TVMaze: ${response.status}`);
            
            const data = await response.json();
            
            if (!data || data.length === 0) return [];

            return data
                .filter(item => item.show && item.show.name)
                .map(item => {
                    let posterUrl = 'https://via.placeholder.com/300x450?text=No+Image';
                    if (item.show.image && item.show.image.medium) {
                        posterUrl = item.show.image.medium;
                    } else if (item.show.image && item.show.image.original) {
                        posterUrl = item.show.image.original;
                    }

                    const isRu = isRussian(item.show.name);
                    const title = item.show.name;
                    const originalTitle = item.show.language === 'en' && !isRu ? item.show.name : '';

                    return {
                        id: `tvmaze_${item.show.id}`,
                        title: title,
                        originalTitle: originalTitle,
                        year: item.show.premiered ? item.show.premiered.substring(0, 4) : '',
                        endYear: item.show.ended ? item.show.ended.substring(0, 4) : '',
                        episodes: item.show.episodes || 0,
                        posterUrl: posterUrl,
                        network: item.show.network ? item.show.network.name : '',
                        rating: item.show.rating ? item.show.rating.average : null
                    };
                });
        }

        async function searchOMDb(query) {
            const response = await fetch(`${OMDB_BASE_URL}?s=${encodeURIComponent(query)}&type=series`);
            
            if (!response.ok) throw new Error(`OMDb: ${response.status}`);
            
            const data = await response.json();
            
            if (!data.Search) return [];

            return data.Search
                .filter(show => show.Title)
                .map((show, index) => ({
                    id: `omdb_${show.imdbID || index}_${Date.now()}`,
                    title: show.Title,
                    originalTitle: show.Title,
                    year: show.Year,
                    endYear: '',
                    episodes: 0,
                    posterUrl: show.Poster && show.Poster !== 'N/A' ? show.Poster : 'https://via.placeholder.com/300x450?text=No+Image'
                }));
        }

        function addShowFromApi(id, title, originalTitle, posterUrl) {
            if (!state.shows.find(s => s.id === id)) {
                state.shows.push({
                    id: id,
                    title: title,
                    originalTitle: originalTitle || '',
                    posterUrl: optimizeImageUrl(posterUrl),
                    rating: null,
                    impressions: '',
                    year: '',
                    endYear: '',
                    episodes: 0
                });
                saveUserData();
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').classList.add('hidden');
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }
            }
        }

        function removeShow(event, id) {
            event.preventDefault();
            event.stopPropagation();
            
            if(confirm('Удалить этот сериал из списка?')) {
                const item = document.querySelector(`[data-show-id="${id}"]`);
                if (item) {
                    item.classList.add('removing');
                    setTimeout(() => {
                        state.shows = state.shows.filter(s => s.id !== id);
                        saveUserData();
                    }, 300);
                } else {
                    state.shows = state.shows.filter(s => s.id !== id);
                    saveUserData();
                }
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
                }
            }
        }

        function getRatingClass(rating) {
            if (rating === null || rating === undefined) return 'rating-none';
            if (rating >= 7.5) return 'rating-high';
            if (rating >= 5) return 'rating-med';
            return 'rating-low';
        }

        function renderShowList() {
            const container = document.getElementById('showList');
            const emptyState = document.getElementById('emptyState');
            const showCount = document.getElementById('showCount');
            
            container.innerHTML = '';

            if (state.shows.length === 0) {
                emptyState.classList.remove('hidden');
                showCount.innerText = '0 сериалов';
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            const sortedShows = [...state.shows].sort((a, b) => {
                const ratingA = a.rating !== null && a.rating !== undefined ? a.rating : -1;
                const ratingB = b.rating !== null && b.rating !== undefined ? b.rating : -1;
                return ratingB - ratingA;
            });

            showCount.innerText = `${sortedShows.length} сериал${sortedShows.length === 1 ? '' : 'ов'}`;

            sortedShows.forEach(show => {
                const item = document.createElement('div');
                item.className = 'list-item adding';
                item.setAttribute('data-show-id', show.id);
                item.onclick = (e) => {
                    if (!e.target.closest('.delete-btn')) {
                        openModal(show.id);
                    }
                };
                
                const ratingClass = getRatingClass(show.rating);
                const ratingDisplay = show.rating !== null && show.rating !== undefined
                    ? show.rating.toFixed(1)
                    : '--';

                const safePosterUrl = optimizeImageUrl(show.posterUrl);

                const yearRange = show.year && show.endYear && show.endYear !== show.year 
                    ? `${show.year} – ${show.endYear}` 
                    : (show.year || '—');
                const episodesText = show.episodes && show.episodes > 0 
                    ? `${show.episodes} серий` 
                    : '';

                const originalTitleHtml = show.originalTitle && show.originalTitle !== show.title && !isRussian(show.title)
                    ? `<p class="original-title">${show.originalTitle}</p>`
                    : '';

                item.innerHTML = `
                    <div class="poster-container">
                        <img src="${safePosterUrl}" class="w-full h-full object-cover poster-img" loading="lazy" onload="this.classList.add('loaded'); this.classList.remove('loading');" onerror="this.src='https://via.placeholder.com/200x280?text=No+Image'; this.classList.add('loaded');">
                    </div>
                    
                    <div class="info-column">
                        <h3 class="show-title">${show.title}</h3>
                        ${originalTitleHtml}
                        <div class="meta-info">
                            ${yearRange ? `<span class="meta-tag">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                ${yearRange}
                            </span>` : ''}
                            ${episodesText ? `<span class="meta-tag">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path></svg>
                                ${episodesText}
                            </span>` : ''}
                        </div>
                    </div>
                    
                    <div class="right-column">
                        <div class="rating-badge ${ratingClass}">
                            ${ratingDisplay}
                        </div>
                        <button onclick="removeShow(event, '${show.id}')" class="delete-btn bg-black/60 hover:bg-red-600 text-white rounded-full p-2 backdrop-blur-sm transition-colors border border-white/10">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function openModal(id) {
            const show = state.shows.find(s => s.id === id);
            if (!show) {
                console.error('Show not found:', id);
                return;
            }

            state.currentModalShowId = id;

            const posterImg = document.getElementById('modalPoster');
            posterImg.classList.remove('loaded');
            posterImg.classList.add('loading');
            posterImg.src = optimizeImageUrl(show.posterUrl);
            
            document.getElementById('modalTitle').innerText = show.title;
            document.getElementById('modalOriginalTitle').innerText = show.originalTitle && show.originalTitle !== show.title ? show.originalTitle : '';
            document.getElementById('modalStudio').innerText = 'Сериал';
            document.getElementById('modalRatingDisplay').innerText = (show.rating !== null && show.rating !== undefined) ? show.rating.toFixed(1) : '--';
            document.getElementById('impressionsInput').value = show.impressions || '';
            
            document.getElementById('ratingInputContainer').classList.add('hidden');
            document.getElementById('detailModal').classList.remove('hidden');
            
            if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.selectionChanged();
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            state.currentModalShowId = null;
        }

        function enableEditRating() {
            const container = document.getElementById('ratingInputContainer');
            const input = document.getElementById('ratingInput');
            const show = state.shows.find(s => s.id === state.currentModalShowId);
            
            input.value = show.rating !== null && show.rating !== undefined ? show.rating : '';
            container.classList.remove('hidden');
            input.focus();
        }

        function saveRating() {
            const input = document.getElementById('ratingInput');
            let val = parseFloat(input.value);
            
            if (isNaN(val)) val = 0;
            if (val < 0) val = 0;
            if (val > 10) val = 10;

            val = Math.round(val * 10) / 10;

            const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
            if (showIndex !== -1) {
                state.shows[showIndex].rating = val;
                saveUserData();
                document.getElementById('modalRatingDisplay').innerText = val.toFixed(1);
                document.getElementById('ratingInputContainer').classList.add('hidden');
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            }
        }

        function saveImpressions() {
            const text = document.getElementById('impressionsInput').value;
            const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
            
            if (showIndex !== -1) {
                state.shows[showIndex].impressions = text;
                saveUserData();
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            }
        }

        function shareProfile() {
            const link = `https://t.me/your_bot_name?startapp=${state.userId}`;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => {
                    if(window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.showAlert('Ссылка скопирована!');
                    } else {
                        alert('Ссылка скопирована!');
                    }
                });
            } else {
                window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Зацени мой список сериалов!`, '_blank');
            }
        }
    </script>
</body>
</html>
