<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Series App</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: var(--tg-theme-bg-color, #fff); --text: var(--tg-theme-text-color, #000); --accent: #3390ec; --sec: var(--tg-theme-secondary-bg-color, #f4f4f5); }
        body { font-family: sans-serif; background: var(--sec); color: var(--text); margin: 0; padding: 0; }
        .search-row { position: sticky; top: 0; background: var(--bg); padding: 12px; display: flex; gap: 8px; z-index: 100; border-bottom: 1px solid #ddd; }
        input { flex-grow: 1; padding: 12px; border-radius: 10px; border: 1px solid #ccc; background: var(--sec); color: var(--text); font-size: 16px; }
        .search-btn { background: var(--accent); color: #fff; border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; }
        #results { position: absolute; top: 60px; left: 12px; right: 12px; background: var(--bg); border-radius: 0 0 15px 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: none; max-height: 300px; overflow-y: auto; }
        .res-item { display: flex; padding: 10px; border-bottom: 1px solid #eee; align-items: center; cursor: pointer; }
        .res-item img { width: 40px; height: 55px; border-radius: 4px; object-fit: cover; margin-right: 12px; }
        .my-list { padding: 12px; }
        .card { display: flex; background: var(--bg); border-radius: 15px; margin-bottom: 10px; padding: 10px; align-items: center; }
        .card img { width: 60px; height: 90px; border-radius: 8px; object-fit: cover; }
        .card-body { flex-grow: 1; margin: 0 15px; }
        .card-title { font-weight: bold; font-size: 16px; }
        .card-rate { color: var(--accent); font-weight: 800; font-size: 14px; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-win { background: var(--bg); margin: 15% auto; width: 85%; padding: 20px; border-radius: 20px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; border-radius: 10px; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="search-row">
    <input type="text" id="q" placeholder="Название (English)..." enterkeyhint="search">
    <button class="search-btn" onclick="doSearch()">Найти</button>
    <div id="results"></div>
</div>

<div class="my-list" id="list"></div>

<div id="modal">
    <div class="modal-win">
        <h2 id="mT" style="margin:0"></h2>
        <input type="number" id="mR" step="0.01" min="0" max="10" placeholder="Ваша оценка">
        <textarea id="mE" placeholder="Отзыв..."></textarea>
        <button style="width:100%; background:var(--accent); color:#fff; padding:12px; border:none; border-radius:10px;" onclick="save()">Сохранить</button>
        <button style="width:100%; background:none; border:none; color:red; margin-top:10px;" onclick="closeM()">Закрыть</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let myS = JSON.parse(localStorage.getItem('serials_db') || '[]');
    let cur = null;

    tg.ready(); tg.expand();
    render();

    async function doSearch() {
        const val = document.getElementById('q').value.trim();
        const resDiv = document.getElementById('results');
        if (!val) return;

        resDiv.style.display = 'block';
        resDiv.innerHTML = '<div style="padding:15px; color:#888;">Ищем...</div>';

        try {
            const r = await fetch(`https://api.tvmaze.com{encodeURIComponent(val)}`);
            const data = await r.json();
            
            if (data.length === 0) {
                resDiv.innerHTML = '<div style="padding:15px; color:#888;">Ничего не нашли</div>';
            } else {
                resDiv.innerHTML = data.map(i => `
                    <div class="res-item" onclick="add('${i.show.id}', '${i.show.name.replace(/'/g,"")}', '${i.show.image ? i.show.image.medium : ""}')">
                        <img src="${i.show.image ? i.show.image.medium : "https://via.placeholder.com"}">
                        <div><b>${i.show.name}</b></div>
                    </div>
                `).join('');
            }
        } catch (e) {
            resDiv.innerHTML = '<div style="padding:15px; color:red;">Ошибка связи с API</div>';
        }
    }

    function add(id, name, img) {
        if (!myS.find(x => x.id == id)) {
            myS.push({ id, name, img, rating: "0.00", review: "" });
            localStorage.setItem('serials_db', JSON.stringify(myS));
            render();
        }
        document.getElementById('results').style.display = 'none';
        document.getElementById('q').value = '';
    }

    function render() {
        const list = document.getElementById('list');
        if (myS.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#888; margin-top:50px;">Ваш список пуст</p>';
            return;
        }
        list.innerHTML = myS.map((s, i) => `
            <div class="card" onclick="openM(${i})">
                <img src="${s.img || "https://via.placeholder.com"}">
                <div class="card-body">
                    <div class="card-title">${s.name}</div>
                    <div class="card-rate">★ ${s.rating}</div>
                </div>
            </div>
        `).join('');
    }

    function openM(i) {
        cur = i;
        document.getElementById('mT').innerText = myS[i].name;
        document.getElementById('mR').value = myS[i].rating;
        document.getElementById('mE').value = myS[i].review;
        document.getElementById('modal').style.display = 'block';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function save() {
        myS[cur].rating = parseFloat(document.getElementById('mR').value || 0).toFixed(2);
        myS[cur].review = document.getElementById('mE').value;
        localStorage.setItem('serials_db', JSON.stringify(myS));
        render(); closeM();
    }
</script>
</body>
</html>
