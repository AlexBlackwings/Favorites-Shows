<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MySeries Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Все стили без изменений (такие же, как в предыдущей версии) */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-backdrop { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }

        .glass-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.12);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .delete-btn {
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            min-width: 44px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.05);
            color: #6b7280;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1;
            box-sizing: border-box;
        }
        .delete-btn:hover {
            background: rgba(220, 38, 38, 0.2);
            color: #ef4444;
            border-color: rgba(220, 38, 38, 0.3);
        }
        .delete-btn:active {
            transform: scale(0.95);
            background-color: rgba(220, 38, 38, 0.3);
        }

        .poster-container {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            width: 100px;
            height: 140px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .poster-img {
            transition: opacity 0.3s ease;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
        }
        .poster-img.loading { opacity: 0.5; }
        .poster-img.loaded { opacity: 1; }

        .poster-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #4b5563;
            font-size: 10px;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .poster-placeholder svg {
            width: 40px;
            height: 40px;
            opacity: 0.5;
        }

        .rating-badge {
            min-width: 44px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            box-sizing: border-box;
        }
        .rating-high { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .rating-med { background: rgba(234, 179, 8, 0.2); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3); }
        .rating-low { background: rgba(107, 114, 128, 0.2); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.3); }
        .rating-none { background: rgba(255, 255, 255, 0.05); color: #6b7280; border: 1px solid rgba(255, 255, 255, 0.1); }

        .list-item {
            margin-bottom: 12px;
            transition: all 0.3s ease;
            list-style: none;
        }
        .list-item.removing {
            transform: translateX(-100%);
            opacity: 0;
        }
        .list-item.adding {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #showList {
            list-style: none;
            padding-left: 0;
        }

        .show-card {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 12px;
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .show-card:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .show-card-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 4px;
        }

        .show-card-right {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            flex-shrink: 0;
            min-width: 44px;
        }

        .show-card-number {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
            white-space: nowrap;
        }

        .show-card-actions {
            display: flex;
            flex-direction: row;
            gap: 8px;
            align-items: center;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
        }

        .meta-tag {
            font-size: 10px;
            color: #9ca3af;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
        }
        .meta-tag svg {
            width: 10px;
            height: 10px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .genre-tag {
            font-size: 10px;
            color: #60a5fa;
            background: rgba(59, 130, 246, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .status-running { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .status-ended { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .original-title {
            font-size: 11px;
            color: #6b7280;
            font-weight: 400;
            margin-top: 2px;
        }

        .show-title {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .platform-tag {
            font-size: 10px;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }

        #searchResults.hidden {
            display: none !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 sticky top-0 z-20 bg-[#0f0f0f]/95 backdrop-blur-md border-b border-white/5 shadow-lg">
        <div class="flex items-center justify-between">
            <h1 class="text-lg font-bold tracking-tight text-white" id="dynamicTitle">Мой рейтинг из 0 сериалов</h1>
            <button id="clearAllBtn" class="text-xs text-gray-500 hover:text-red-400 transition-colors">
                Сброс
            </button>
        </div>
        
        <div class="relative mt-3">
            <input type="text" id="searchInput" placeholder="Поиск (Ведьмак, Mandalorian...)..." 
                class="w-full glass-input rounded-xl pl-4 pr-10 py-3 text-sm placeholder-gray-500 transition-all shadow-inner">
            
            <div id="searchLoader" class="absolute right-3 top-3 hidden">
                <div class="loader"></div>
            </div>

            <div id="searchResults" class="absolute top-full left-0 right-0 mt-2 bg-[#1a1a1a] border border-white/10 rounded-xl shadow-2xl max-h-64 overflow-y-auto z-50 hidden">
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-24">
        
        <div id="emptyState" class="flex flex-col items-center justify-center h-64 text-gray-500 text-center px-6 hidden">
            <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <p class="text-sm">Ваш список пуст.<br>Введите название сериала в поиск сверху.</p>
        </div>

        <div id="showList" class="px-4 py-4">
        </div>
    </main>

    <!-- Модальное окно с расширенной информацией -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
        
        <div class="absolute bottom-0 left-0 right-0 bg-[#1a1a1a] rounded-t-3xl p-6 max-h-[85vh] overflow-y-auto slide-up border-t border-white/10">
            
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-6 opacity-50"></div>
            
            <div class="flex gap-5 mb-6">
                <div class="poster-container flex-shrink-0">
                    <img id="modalPoster" class="w-full h-full object-cover poster-img" src="" alt="Poster" onload="this.classList.add('loaded'); this.classList.remove('loading');" onerror="this.onerror=null; this.src=''; this.parentElement.querySelector('.poster-placeholder').style.display='flex'; this.style.display='none';">
                    <div class="poster-placeholder" style="display: none;">
                        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4-3h2v13h-2z"/></svg>
                    </div>
                </div>
                <div class="flex-1 flex flex-col justify-center">
                    <h2 id="modalTitle" class="text-xl font-bold text-white leading-tight mb-1"></h2>
                    <p id="modalOriginalTitle" class="text-sm text-gray-500 mb-2"></p>
                    
                    <div class="flex flex-wrap gap-2 mb-3">
                        <span id="modalStatus" class="status-badge status-running">🟢 Продолжается</span>
                        <span id="modalNetwork" class="platform-icon">📺 HBO</span>
                    </div>
                    
                    <div class="flex items-center gap-3 mb-3">
                        <div class="bg-green-500/10 text-green-400 px-3 py-1.5 rounded-lg text-sm font-bold border border-green-500/20 flex items-center gap-1">
                            <span id="modalRating">--</span> 
                            <span class="text-xs opacity-60">/ 10</span>
                        </div>
                        <span id="modalRuntime" class="text-xs text-gray-400">⏱ 60 мин</span>
                        <span id="modalSeasons" class="text-xs text-gray-400">📀 5 сезонов</span>
                    </div>

                    <button onclick="enableEditRating()" class="text-xs text-gray-400 hover:text-white underline decoration-gray-600 underline-offset-2 w-fit">Оценить</button>
                </div>
            </div>

            <!-- Жанры -->
            <div class="mb-4">
                <label class="block text-xs text-gray-400 mb-2 uppercase tracking-wider font-bold">Жанры</label>
                <div id="modalGenres" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- Сюжет (полный) -->
            <div class="mb-4">
                <label class="block text-xs text-gray-400 mb-2 uppercase tracking-wider font-bold">Сюжет</label>
                <p id="modalSummary" class="text-sm text-gray-300 leading-relaxed"></p>
            </div>

            <!-- Актёры -->
            <div class="mb-4">
                <label class="block text-xs text-gray-400 mb-2 uppercase tracking-wider font-bold">В главных ролях</label>
                <p id="modalActors" class="text-sm text-gray-300"></p>
            </div>

            <!-- Поле оценки с шагом 0.01 -->
            <div id="ratingInputContainer" class="mb-6 hidden bg-white/5 p-4 rounded-xl border border-white/5">
                <label class="block text-xs text-gray-400 mb-2 font-medium">Ваша оценка</label>
                <div class="flex gap-2">
                    <input type="number" id="ratingInput" step="0.01" min="0" max="10" class="glass-input w-full px-3 py-2 rounded-lg text-sm font-mono" placeholder="0.00 - 10.00">
                    <button onclick="saveRating()" class="bg-green-600 hover:bg-green-500 text-white px-4 rounded-lg text-sm font-bold transition-colors">OK</button>
                </div>
            </div>

            <!-- Впечатления -->
            <div class="mb-24 sm:mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">Ваши впечатления</label>
                <textarea id="impressionsInput" rows="6" class="w-full glass-input rounded-xl p-4 text-sm resize-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="Напишите рецензию..."></textarea>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="saveImpressions()" class="flex-1 bg-white text-black py-3.5 rounded-xl font-bold text-sm hover:bg-gray-200 transition-colors">
                    Сохранить
                </button>
                <button onclick="closeModal()" class="flex-1 bg-gray-800 text-white py-3.5 rounded-xl font-bold text-sm hover:bg-gray-700 transition-colors">
                    Закрыть
                </button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---- Константы и вспомогательные функции ----
            const TVMAZE_BASE_URL = 'https://api.tvmaze.com';
            const OMDB_BASE_URL = 'https://www.omdbapi.com';

            const IMAGE_CACHE_KEY = 'tma_image_cache';
            const IMAGE_CACHE_EXPIRY = 7 * 24 * 60 * 60 * 1000;

            const GENRE_TRANSLATIONS = {
                'Drama': 'Драма', 'Comedy': 'Комедия', 'Action': 'Боевик',
                'Adventure': 'Приключения', 'Crime': 'Криминал', 'Mystery': 'Мистика',
                'Thriller': 'Триллер', 'Horror': 'Ужасы', 'Romance': 'Мелодрама',
                'Science-Fiction': 'Фантастика', 'Fantasy': 'Фэнтези', 'Family': 'Семейный',
                'Animation': 'Анимация', 'Documentary': 'Документальный', 'History': 'История',
                'War': 'Военный', 'Music': 'Музыка', 'Western': 'Вестерн', 'Sport': 'Спорт',
                'Reality': 'Реалити-шоу', 'Talk Show': 'Ток-шоу', 'News': 'Новости',
                'Soap': 'Мыльная опера', 'Sitcom': 'Ситком', 'Medical': 'Медицинский',
                'Legal': 'Юридический', 'Political': 'Политический', 'Supernatural': 'Сверхъестественное',
                'Teen': 'Подростковый', 'Post-Apocalyptic': 'Постапокалипсис', 'Space': 'Космос',
                'Detective': 'Детектив'
            };

            function translateGenre(genreEn) { return GENRE_TRANSLATIONS[genreEn] || genreEn; }

            const TRANSLITERATION = {
                'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y',
                'к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f',
                'х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
            };

            const SHOW_TRANSLATIONS = {
                'ведьмак':'The Witcher','мандалорец':'The Mandalorian','сыны анархии':'Sons of Anarchy',
                'женщина халк':'She-Hulk','во все тяжкие':'Breaking Bad','лучше звоните солу':'Better Call Saul',
                'очень странные дела':'Stranger Things','игра престолов':'Game of Thrones','дом дракона':'House of the Dragon',
                'чернобыль':'Chernobyl','тьма':'Dark','офис':'The Office','друзья':'Friends','шерлок':'Sherlock',
                'рик и морти':'Rick and Morty','игра в кальмара':'Squid Game','эйфория':'Euphoria',
                'острые козырьки':'Peaky Blinders','черное зеркало':'Black Mirror','наследники':'Succession',
                'пацаны':'The Boys','уэнсдей':'Wednesday','аркейн':'Arcane','академия амбрелла':'The Umbrella Academy',
                'озарк':'Ozark','корона':'The Crown','сексуальное воспитание':'Sex Education','бумажный дом':'Money Heist',
                'элита':'Elite','сверхъестественное':'Supernatural','клиник':'Scrubs','теория большого взрыва':'The Big Bang Theory',
                'как я встретил вашу маму':'How I Met Your Mother','бруклин 99':'Brooklyn Nine-Nine',
                'ход мертвецов':'The Walking Dead','lost':'Lost','остаться в живых':'Lost','доктор кто':'Doctor Who',
                'секретные материалы':'The X-Files','звездный путь':'Star Trek','звездные войны':'Star Wars',
                'бригада':'Brigada','локи':'Loki','силу':'Silo','меня зовут эрл':'My Name Is Earl'
            };

            let state = {
                userId: null,
                shows: [],
                currentModalShowId: null,
                dataLoaded: false
            };

            function getSeriesWord(count) {
                if (count % 10 === 1 && count % 100 !== 11) return 'сериала';
                return 'сериалов';
            }

            function updateHeaderTitle() {
                document.getElementById('dynamicTitle').textContent = `Мой рейтинг из ${state.shows.length} ${getSeriesWord(state.shows.length)}`;
            }

            // ---- Работа с кешем изображений ----
            function getCachedImage(url) {
                try {
                    const cache = JSON.parse(localStorage.getItem(IMAGE_CACHE_KEY) || '{}');
                    const cached = cache[url];
                    if (cached && Date.now() - cached.timestamp < IMAGE_CACHE_EXPIRY) return cached.url;
                } catch (e) { console.warn('Cache read error:', e); }
                return null;
            }

            function cacheImage(originalUrl, optimizedUrl) {
                try {
                    const cache = JSON.parse(localStorage.getItem(IMAGE_CACHE_KEY) || '{}');
                    cache[originalUrl] = { url: optimizedUrl, timestamp: Date.now() };
                    const keys = Object.keys(cache);
                    if (keys.length > 100) keys.slice(0, keys.length - 100).forEach(key => delete cache[key]);
                    localStorage.setItem(IMAGE_CACHE_KEY, JSON.stringify(cache));
                } catch (e) { console.warn('Cache write error:', e); }
            }

            function cleanImageCache() {
                try {
                    const cache = JSON.parse(localStorage.getItem(IMAGE_CACHE_KEY) || '{}');
                    const now = Date.now();
                    Object.keys(cache).forEach(key => { if (now - cache[key].timestamp > IMAGE_CACHE_EXPIRY) delete cache[key]; });
                    localStorage.setItem(IMAGE_CACHE_KEY, JSON.stringify(cache));
                } catch (e) { console.warn('Cache clean error:', e); }
            }

            function optimizeImageUrl(url) {
                if (!url || url.includes('placeholder')) return url;
                const cached = getCachedImage(url);
                if (cached) return cached;

                let optimized = url;
                if (url.includes('tvmaze.com') && url.includes('/original/')) {
                    optimized = url.replace('/original/', '/medium/');
                } else if (url.includes('imdb.com') || url.includes('omdbapi.com')) {
                    optimized = url.replace('_V1_.jpg', '_V1_SX300.jpg');
                }
                optimized = optimized.replace('.png', '.jpg');
                if (optimized !== url) cacheImage(url, optimized);
                return optimized;
            }

            // ---- Бесконечные попытки загрузки изображения ----
            function loadImageWithRetry(imgElement, url, attempt = 1) {
                if (!url) {
                    showPlaceholder(imgElement);
                    return;
                }

                let timeoutId = setTimeout(() => {
                    if (!imgElement.classList.contains('loaded')) {
                        console.warn(`Image load timeout (attempt ${attempt})`, url);
                        handleError();
                    }
                }, 10000);

                function handleError() {
                    clearTimeout(timeoutId);
                    let nextUrl = url;
                    if (url.includes('/medium/')) {
                        nextUrl = url.replace('/medium/', '/original/');
                    } else if (url.includes('SX300')) {
                        nextUrl = url.replace('SX300', 'SX500');
                    } else if (url.includes('/original/')) {
                        nextUrl = url.replace('/original/', '/medium/');
                    } else {
                        nextUrl = url;
                    }
                    const delay = Math.min(2000 * Math.pow(1.5, attempt - 1), 30000);
                    setTimeout(() => {
                        loadImageWithRetry(imgElement, nextUrl, attempt + 1);
                    }, delay);
                }

                imgElement.classList.add('loading');
                imgElement.classList.remove('loaded');
                imgElement.onload = function() {
                    clearTimeout(timeoutId);
                    if (this.naturalWidth === 0 || this.naturalHeight === 0) {
                        handleError();
                        return;
                    }
                    this.classList.remove('loading');
                    this.classList.add('loaded');
                    const placeholder = this.parentElement?.querySelector('.poster-placeholder');
                    if (placeholder) placeholder.style.display = 'none';
                    this.style.display = 'block';
                };
                imgElement.onerror = function() {
                    clearTimeout(timeoutId);
                    handleError();
                };
                imgElement.src = url;
            }

            function showPlaceholder(imgElement) {
                imgElement.classList.remove('loading');
                imgElement.classList.add('loaded');
                imgElement.style.display = 'none';
                const placeholder = imgElement.parentElement?.querySelector('.poster-placeholder');
                if (placeholder) placeholder.style.display = 'flex';
            }

            // ---- Инициализация ----
            document.addEventListener('DOMContentLoaded', () => {
                cleanImageCache();
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                    const tgUser = window.Telegram.WebApp.initDataUnsafe?.user;
                    // Используем реальный ID пользователя Telegram для единого ключа на всех устройствах
                    state.userId = tgUser ? 'tg_' + tgUser.id : 'web_' + Math.random().toString(36).substr(2, 9);
                } else {
                    state.userId = 'web_' + Math.random().toString(36).substr(2, 9);
                }
                
                loadUserData(() => {
                    renderShowList();
                    updateHeaderTitle();
                });
                
                setupSearch();
                document.getElementById('clearAllBtn').addEventListener('click', clearAllData);
            });

            // ---- Данные пользователя с миграцией из localStorage и синхронизацией ----
            function loadUserData(callback) {
                const key = `tma_shows_${state.userId}`;
                if (window.Telegram?.WebApp?.CloudStorage) {
                    Telegram.WebApp.CloudStorage.getItem(key, (error, value) => {
                        if (!error && value) {
                            // Данные есть в облаке
                            try {
                                state.shows = JSON.parse(value);
                                console.log('Loaded from CloudStorage:', state.shows.length);
                            } catch (e) {
                                console.warn('CloudStorage parse error:', e);
                                state.shows = [];
                            }
                            // Дублируем в localStorage для кэша
                            localStorage.setItem(key, JSON.stringify(state.shows));
                            state.dataLoaded = true;
                            if (callback) callback();
                        } else {
                            // Нет данных в облаке - пробуем localStorage
                            console.log('No CloudStorage data, trying localStorage');
                            try {
                                const localData = localStorage.getItem(key);
                                if (localData) {
                                    state.shows = JSON.parse(localData);
                                    console.log('Loaded from localStorage:', state.shows.length);
                                    // Сохраняем в облако
                                    Telegram.WebApp.CloudStorage.setItem(key, localData, (err) => {
                                        if (err) console.warn('CloudStorage save error during migration:', err);
                                        else console.log('Migrated localStorage data to CloudStorage');
                                    });
                                } else {
                                    state.shows = [];
                                    console.log('No data in localStorage either');
                                }
                            } catch (e) {
                                console.warn('localStorage read error:', e);
                                state.shows = [];
                            }
                            state.dataLoaded = true;
                            if (callback) callback();
                        }
                    });
                } else {
                    // Вне Telegram - только localStorage
                    try {
                        state.shows = JSON.parse(localStorage.getItem(key) || '[]');
                        console.log('Loaded from localStorage (outside TG):', state.shows.length);
                    } catch {
                        state.shows = [];
                    }
                    state.dataLoaded = true;
                    if (callback) callback();
                }
            }

            function saveUserData() {
                const key = `tma_shows_${state.userId}`;
                const data = JSON.stringify(state.shows);
                // Всегда сохраняем в localStorage для резерва
                localStorage.setItem(key, data);
                if (window.Telegram?.WebApp?.CloudStorage) {
                    Telegram.WebApp.CloudStorage.setItem(key, data, (error, success) => {
                        if (error) {
                            console.warn('CloudStorage save error:', error);
                        } else {
                            console.log('CloudStorage save successful');
                        }
                    });
                }
                renderShowList();
                updateHeaderTitle();
            }

            function clearAllData() {
                if (confirm('Удалить весь список сериалов?')) {
                    state.shows = [];
                    saveUserData();
                    window.Telegram?.WebApp.HapticFeedback?.notificationOccurred('warning');
                }
            }

            // ---- Поиск (полная версия) ----
            function setupSearch() {
                const input = document.getElementById('searchInput');
                const resultsDiv = document.getElementById('searchResults');
                const loader = document.getElementById('searchLoader');
                let timeoutId = null;

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('#searchInput') && !e.target.closest('#searchResults')) {
                        resultsDiv.classList.add('hidden');
                    }
                });

                input.addEventListener('input', (e) => {
                    const val = e.target.value.trim();
                    if (timeoutId) clearTimeout(timeoutId);
                    if (val.length < 2) {
                        resultsDiv.classList.add('hidden');
                        return;
                    }
                    timeoutId = setTimeout(() => performSearch(val), 600);
                });
            }

            function transliterate(text) {
                return text.toLowerCase().split('').map(c => TRANSLITERATION[c] || c).join('');
            }

            function isRussian(text) { return /[а-яё]/i.test(text); }

            async function performSearch(query) {
                const resultsDiv = document.getElementById('searchResults');
                const loader = document.getElementById('searchLoader');
                
                loader.classList.remove('hidden');
                resultsDiv.innerHTML = '';
                resultsDiv.classList.remove('hidden');

                try {
                    let allResults = [];
                    const seenIds = new Set();

                    const searchTerms = [query];
                    const lowerQuery = query.toLowerCase();

                    for (const [ru, en] of Object.entries(SHOW_TRANSLATIONS)) {
                        if (lowerQuery.includes(ru)) {
                            searchTerms.push(en);
                            break;
                        }
                    }

                    if (isRussian(query)) {
                        searchTerms.push(transliterate(query));
                    }

                    for (const term of searchTerms) {
                        try {
                            const tvmazeResults = await searchTVMaze(term);
                            tvmazeResults.forEach(show => {
                                if (!seenIds.has(show.id)) {
                                    seenIds.add(show.id);
                                    allResults.push({ ...show, source: 'TVMaze' });
                                }
                            });
                        } catch (e) {
                            console.warn('TVMaze failed:', e);
                        }

                        if (allResults.length >= 15) break;
                    }

                    if (allResults.length < 5) {
                        try {
                            const omdbResults = await searchOMDb(query);
                            omdbResults.forEach(show => {
                                if (!seenIds.has(show.id)) {
                                    seenIds.add(show.id);
                                    allResults.push({ ...show, source: 'OMDb' });
                                }
                            });
                        } catch (e) {
                            console.warn('OMDb failed:', e);
                        }
                    }

                    loader.classList.add('hidden');
                    resultsDiv.innerHTML = '';

                    if (allResults.length === 0) {
                        const emptyDiv = document.createElement('div');
                        emptyDiv.className = 'p-4 text-center text-sm text-gray-400';
                        emptyDiv.innerHTML = 'Ничего не найдено 😔<br><span class="text-xs opacity-60">Попробуйте английское название</span>';
                        resultsDiv.appendChild(emptyDiv);
                        return;
                    }

                    allResults.slice(0, 20).forEach(show => {
                        const exists = state.shows.some(s => s.id === show.id);
                        
                        const posterUrl = optimizeImageUrl(show.posterUrl);
                        const year = show.year ? `(${show.year})` : '';

                        const item = document.createElement('div');
                        item.className = 'flex items-center gap-3 p-3 border-b border-white/5 hover:bg-white/5 transition-colors';
                        
                        const posterContainer = document.createElement('div');
                        posterContainer.className = 'poster-container';
                        posterContainer.style.width = '48px';
                        posterContainer.style.height = '64px';
                        
                        const posterImg = document.createElement('img');
                        posterImg.className = 'w-full h-full object-cover poster-img';
                        posterImg.loading = 'lazy';
                        posterImg.alt = show.title;
                        const placeholderDiv = document.createElement('div');
                        placeholderDiv.className = 'poster-placeholder';
                        placeholderDiv.innerHTML = '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4-3h2v13h-2z"/></svg>';
                        posterContainer.appendChild(posterImg);
                        posterContainer.appendChild(placeholderDiv);
                        loadImageWithRetry(posterImg, posterUrl);
                        
                        const infoDiv = document.createElement('div');
                        infoDiv.className = 'flex-1 min-w-0';
                        
                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'font-semibold text-sm text-white mb-1';
                        titleDiv.textContent = show.title;
                        
                        const yearDiv = document.createElement('div');
                        yearDiv.className = 'text-xs text-gray-400';
                        yearDiv.textContent = year;
                        
                        infoDiv.appendChild(titleDiv);
                        infoDiv.appendChild(yearDiv);
                        
                        const btn = document.createElement('button');
                        btn.className = 'px-3 py-1.5 rounded-md text-xs font-bold uppercase transition-colors';
                        if (exists) {
                            btn.className += ' bg-gray-700 text-gray-400 cursor-not-allowed';
                            btn.disabled = true;
                            btn.textContent = 'В списке';
                        } else {
                            btn.className += ' bg-blue-600 hover:bg-blue-500 text-white';
                            btn.textContent = 'Добавить';
                            btn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                addShowFromApi(
                                    show.id,
                                    show.title,
                                    show.originalTitle || '',
                                    posterUrl,
                                    show.year,
                                    show.endYear,
                                    show.episodes,
                                    show.genres ? show.genres.join(',') : '',
                                    show.network || '',
                                    show.status || '',
                                    show.runtime || '',
                                    show.summary || '',
                                    show.actors || '',
                                    show.rating || '',
                                    show.country || '',
                                    show.age || ''
                                );
                            });
                        }
                        
                        item.appendChild(posterContainer);
                        item.appendChild(infoDiv);
                        item.appendChild(btn);
                        
                        resultsDiv.appendChild(item);
                    });

                } catch (error) {
                    console.error('Search error:', error);
                    loader.classList.add('hidden');
                    resultsDiv.innerHTML = `
                        <div class="p-4 text-center text-sm">
                            <span class="text-red-400">Ошибка поиска</span><br>
                            <span class="text-xs text-gray-500">${error.message}</span>
                        </div>`;
                }
            }

            async function searchTVMaze(query) {
                const response = await fetch(`${TVMAZE_BASE_URL}/search/shows?q=${encodeURIComponent(query)}`);
                if (!response.ok) throw new Error(`TVMaze: ${response.status}`);
                const data = await response.json();
                if (!data || data.length === 0) return [];

                return data
                    .filter(item => item.show && item.show.name)
                    .map(item => {
                        let posterUrl = 'https://via.placeholder.com/300x450?text=No+Image';
                        if (item.show.image && item.show.image.medium) {
                            posterUrl = item.show.image.medium;
                        } else if (item.show.image && item.show.image.original) {
                            posterUrl = item.show.image.original;
                        }

                        const isRu = isRussian(item.show.name);
                        const title = item.show.name;
                        const originalTitle = item.show.language === 'en' && !isRu ? item.show.name : '';

                        let network = '';
                        if (item.show.network && item.show.network.name) {
                            network = item.show.network.name;
                        } else if (item.show.webChannel && item.show.webChannel.name) {
                            network = item.show.webChannel.name;
                        }

                        const genres = (item.show.genres || []).slice(0, 3);

                        let summary = '';
                        if (item.show.summary) {
                            summary = item.show.summary.replace(/<[^>]*>/g, '').trim();
                        }

                        return {
                            id: `tvmaze_${item.show.id}`,
                            title: title,
                            originalTitle: originalTitle,
                            year: item.show.premiered ? item.show.premiered.substring(0, 4) : '',
                            endYear: item.show.ended ? item.show.ended.substring(0, 4) : '',
                            episodes: item.show.episodes || 0,
                            posterUrl: posterUrl,
                            network: network,
                            status: item.show.status || '',
                            runtime: item.show.runtime || 0,
                            genres: genres,
                            summary: summary,
                            actors: '',
                            rating: item.show.rating && item.show.rating.average ? item.show.rating.average : null,
                            country: item.show.country ? item.show.country.name : '',
                            age: '',
                            totalSeasons: item.show._links && item.show._links.seasons ? 'N/A' : ''
                        };
                    });
            }

            async function searchOMDb(query) {
                const response = await fetch(`${OMDB_BASE_URL}?s=${encodeURIComponent(query)}&type=series`);
                if (!response.ok) throw new Error(`OMDb: ${response.status}`);
                const data = await response.json();
                if (!data.Search) return [];

                return data.Search
                    .filter(show => show.Title)
                    .map((show, index) => ({
                        id: `omdb_${show.imdbID || index}_${Date.now()}`,
                        title: show.Title,
                        originalTitle: show.Title,
                        year: show.Year,
                        endYear: '',
                        episodes: 0,
                        posterUrl: show.Poster && show.Poster !== 'N/A' ? show.Poster : 'https://via.placeholder.com/300x450?text=No+Image',
                        network: '',
                        status: '',
                        runtime: 0,
                        genres: [],
                        summary: '',
                        actors: '',
                        rating: null,
                        country: '',
                        age: '',
                        totalSeasons: ''
                    }));
            }

            async function fetchShowDetails(id) {
                if (id.startsWith('tvmaze_')) {
                    const tvmazeId = id.replace('tvmaze_', '');
                    try {
                        const response = await fetch(`${TVMAZE_BASE_URL}/shows/${tvmazeId}?embed=cast`);
                        const data = await response.json();
                        
                        let actors = '';
                        if (data._embedded && data._embedded.cast && data._embedded.cast.length > 0) {
                            actors = data._embedded.cast.slice(0, 4).map(c => c.person.name).join(', ');
                        }

                        let imdbRating = null;
                        let ageRating = '';
                        let totalSeasons = '';
                        
                        if (data.externals && data.externals.imdbId) {
                            try {
                                const omdbResponse = await fetch(`${OMDB_BASE_URL}?i=${data.externals.imdbId}&plot=short`);
                                const omdbData = await omdbResponse.json();
                                if (omdbData.imdbRating && omdbData.imdbRating !== 'N/A') {
                                    imdbRating = parseFloat(omdbData.imdbRating);
                                }
                                if (omdbData.Rated && omdbData.Rated !== 'N/A') {
                                    ageRating = omdbData.Rated;
                                }
                                if (omdbData.totalSeasons && omdbData.totalSeasons !== 'N/A') {
                                    totalSeasons = omdbData.totalSeasons;
                                }
                            } catch (e) {
                                console.warn('OMDb details failed:', e);
                            }
                        }

                        return {
                            actors: actors,
                            imdbRating: imdbRating,
                            ageRating: ageRating,
                            totalSeasons: totalSeasons
                        };
                    } catch (e) {
                        console.warn('Show details failed:', e);
                    }
                }
                return null;
            }

            async function addShowFromApi(id, title, originalTitle, posterUrl, year, endYear, episodes, genres, network, status, runtime, summary, actors, rating, country, age) {
                if (!state.shows.find(s => s.id === id)) {
                    const details = await fetchShowDetails(id);
                    
                    const genresArray = genres ? genres.split(',').map(g => g.trim()) : [];
                    
                    state.shows.push({
                        id: id,
                        title: title,
                        originalTitle: originalTitle || '',
                        posterUrl: optimizeImageUrl(posterUrl),
                        rating: rating ? parseFloat(rating) : null,
                        impressions: '',
                        year: year || '',
                        endYear: endYear || '',
                        episodes: episodes ? parseInt(episodes) : 0,
                        genres: genresArray,
                        network: network || '',
                        status: status || '',
                        runtime: runtime ? parseInt(runtime) : 0,
                        summary: summary || '',
                        actors: (details && details.actors) ? details.actors : (actors || ''),
                        country: country || '',
                        age: (details && details.ageRating) ? details.ageRating : (age || ''),
                        totalSeasons: (details && details.totalSeasons) ? details.totalSeasons : '',
                        imdbRating: (details && details.imdbRating) ? details.imdbRating : null
                    });
                    saveUserData();
                    document.getElementById('searchInput').value = '';
                    document.getElementById('searchResults').classList.add('hidden');
                    
                    if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                    }
                }
            }

            function removeShow(event, id) {
                event.preventDefault();
                event.stopPropagation();
                
                if(confirm('Удалить этот сериал из списка?')) {
                    const item = document.querySelector(`[data-show-id="${id}"]`);
                    if (item) {
                        item.classList.add('removing');
                        setTimeout(() => {
                            state.shows = state.shows.filter(s => s.id !== id);
                            saveUserData();
                        }, 300);
                    } else {
                        state.shows = state.shows.filter(s => s.id !== id);
                        saveUserData();
                    }
                    
                    if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
                    }
                }
            }

            function getRatingClass(rating) {
                if (rating === null || rating === undefined) return 'rating-none';
                if (rating >= 7.5) return 'rating-high';
                if (rating >= 5) return 'rating-med';
                return 'rating-low';
            }

            function getStatusBadge(status) {
                if (status === 'Running') return '<span class="status-badge status-running">🟢 Продолжается</span>';
                if (status === 'Ended') return '<span class="status-badge status-ended">🔴 Завершён</span>';
                return '';
            }

            // ---- Рендеринг списка ----
            function renderShowList() {
                const container = document.getElementById('showList');
                const emptyState = document.getElementById('emptyState');
                container.innerHTML = '';
                if (state.shows.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }
                emptyState.classList.add('hidden');

                const sortedShows = [...state.shows].sort((a, b) => (b.rating ?? -1) - (a.rating ?? -1));

                sortedShows.forEach((show, index) => {
                    const listItem = document.createElement('div');
                    listItem.className = 'list-item adding';
                    listItem.setAttribute('data-show-id', show.id);

                    const ratingClass = getRatingClass(show.rating);
                    const ratingDisplay = show.rating !== null && show.rating !== undefined ? show.rating.toFixed(2) : '--';

                    const safePosterUrl = optimizeImageUrl(show.posterUrl);
                    const yearRange = show.year && show.endYear && show.endYear !== show.year ? `${show.year} – ${show.endYear}` : (show.year || '—');
                    const episodesText = show.episodes && show.episodes > 0 ? `${show.episodes} серий` : '';

                    const card = document.createElement('div');
                    card.className = 'show-card';
                    card.addEventListener('click', (e) => { if (!e.target.closest('.delete-btn')) openModal(show.id); });

                    // Постер
                    const posterContainer = document.createElement('div');
                    posterContainer.className = 'poster-container';
                    const posterImg = document.createElement('img');
                    posterImg.className = 'w-full h-full object-cover poster-img';
                    posterImg.loading = 'lazy';
                    posterImg.alt = show.title;
                    const placeholderDiv = document.createElement('div');
                    placeholderDiv.className = 'poster-placeholder';
                    placeholderDiv.innerHTML = '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4-3h2v13h-2z"/></svg>';
                    posterContainer.appendChild(posterImg);
                    posterContainer.appendChild(placeholderDiv);
                    loadImageWithRetry(posterImg, safePosterUrl);

                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'show-card-content';

                    const title = document.createElement('h3');
                    title.className = 'show-title';
                    title.textContent = show.title;
                    contentDiv.appendChild(title);

                    if (show.originalTitle && show.originalTitle !== show.title && !isRussian(show.title)) {

                        orig.className = 'original-title';
                        orig.textContent = show.originalTitle;
                        contentDiv.appendChild(orig);

                    // Ряд 1: статус и платформа

                    row1.className = 'meta-row';

                        if (show.status === 'Running') { statusSpan.className = 'status-badge status-running'; statusSpan.textContent = '🟢 Продолжается'; }
                        else if (show.status === 'Ended') { statusSpan.className = 'status-badge status-ended'; statusSpan.textContent = '🔴 Завершён'; }
                        if (statusSpan.textContent) row1.appendChild(statusSpan);
                    }
                    if (show.network) {

                    }
                    if (row1.children.length) contentDiv.appendChild(row1);

                    const row2 = document.createElement('div');

                    if (show.genres?.length) {
                        show.genres.slice(0, 3).forEach(g => {
                            const genreSpan = document.createElement('span');
                            genreSpan.className = 'genre-tag';
                            genreSpan.textContent = translateGenre(g);

                    const row3 = document.createElement('div');

                    if (yearRange) {

                    card.appendChild(posterContainer);
                    card.appendChild(contentDiv);
                    card.appendChild(rightDiv);

            // ---- Модальное окно ----
            async function openModal(id) {
                const show = state.shows.find(s => s.id === id);
                if (!show) return;
                state.currentModalShowId = id;

                if (!show.actors || show.actors === '') {
                    const details = await fetchShowDetails(id);
                    if (details) {
                        show.actors = details.actors;
                        if (details.imdbRating) show.imdbRating = details.imdbRating;
                        if (details.ageRating) show.age = details.ageRating;
                        if (details.totalSeasons) show.totalSeasons = details.totalSeasons;
                    }
                }

                const posterImg = document.getElementById('modalPoster');
                const placeholder = posterImg.parentElement.querySelector('.poster-placeholder');
                posterImg.style.display = 'block';
                placeholder.style.display = 'none';
                loadImageWithRetry(posterImg, optimizeImageUrl(show.posterUrl));

                document.getElementById('modalTitle').innerText = show.title;
                document.getElementById('modalOriginalTitle').innerText = (show.originalTitle && show.originalTitle !== show.title) ? show.originalTitle : '';
                document.getElementById('modalStatus').innerHTML = getStatusBadge(show.status) || '—';
                const modalNetwork = document.getElementById('modalNetwork');
                if (show.network) {
                    modalNetwork.innerText = `📺 ${show.network}`;
                    modalNetwork.style.display = 'inline-flex';
                } else {
                    modalNetwork.style.display = 'none';
                }

                const displayRating = show.imdbRating || show.rating;
                document.getElementById('modalRating').innerText = displayRating ? displayRating.toFixed(2) : '--';
                document.getElementById('modalRuntime').innerText = show.runtime ? `⏱ ${show.runtime} мин` : '';
                document.getElementById('modalRuntime').style.display = show.runtime ? 'inline' : 'none';
                document.getElementById('modalSeasons').innerText = show.totalSeasons ? `📀 ${show.totalSeasons} сез.` : '';
                document.getElementById('modalSeasons').style.display = show.totalSeasons ? 'inline' : 'none';

                const genresContainer = document.getElementById('modalGenres');
                genresContainer.innerHTML = '';
                if (show.genres?.length) {
                    show.genres.forEach(g => {
                        const tag = document.createElement('span');
                        tag.className = 'genre-tag';
                        tag.innerText = translateGenre(g);
                        genresContainer.appendChild(tag);
                    });
                } else {
                    genresContainer.innerHTML = '<span class="text-sm text-gray-500">—</span>';
                }

                document.getElementById('modalSummary').innerText = show.summary || 'Описание отсутствует';
                document.getElementById('modalActors').innerText = show.actors || 'Информация недоступна';
                document.getElementById('impressionsInput').value = show.impressions || '';

                document.getElementById('ratingInputContainer').classList.add('hidden');
                document.getElementById('detailModal').classList.remove('hidden');
                window.Telegram?.WebApp.HapticFeedback?.selectionChanged();
            }

            function closeModal() {
                document.getElementById('detailModal').classList.add('hidden');
                state.currentModalShowId = null;
            }

            function enableEditRating() {
                const container = document.getElementById('ratingInputContainer');
                const input = document.getElementById('ratingInput');
                const show = state.shows.find(s => s.id === state.currentModalShowId);
                input.value = show.rating ?? '';
                container.classList.remove('hidden');
                input.focus();
            }

            function saveRating() {
                const input = document.getElementById('ratingInput');
                let val = parseFloat(input.value);
                if (isNaN(val)) val = 0;
                val = Math.min(10, Math.max(0, val));
                val = Math.round(val * 100) / 100;

                const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
                if (showIndex !== -1) {
                    state.shows[showIndex].rating = val;
                    saveUserData();
                    const displayRating = state.shows[showIndex].imdbRating || val;
                    document.getElementById('modalRating').innerText = displayRating.toFixed(2);
                    document.getElementById('ratingInputContainer').classList.add('hidden');
                    window.Telegram?.WebApp.HapticFeedback?.notificationOccurred('success');
                }
            }

            function saveImpressions() {
                const text = document.getElementById('impressionsInput').value;
                const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
                if (showIndex !== -1) {
                    state.shows[showIndex].impressions = text;
                    saveUserData();
                    window.Telegram?.WebApp.HapticFeedback?.notificationOccurred('success');
                }
            }

            function shareProfile() { console.warn('shareProfile called but removed'); }

            window.openModal = openModal;
            window.closeModal = closeModal;
            window.enableEditRating = enableEditRating;
            window.saveRating = saveRating;
            window.saveImpressions = saveImpressions;
            window.shareProfile = shareProfile;
            window.removeShow = removeShow;
            window.addShowFromApi = addShowFromApi;
            window.clearAllData = clearAllData;
        })();
    </script>
</body>
</html>
