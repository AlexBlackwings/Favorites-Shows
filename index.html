<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MySeries Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }

        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-backdrop { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }

        .glass-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.12);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .delete-btn {
            opacity: 1;
            transition: transform 0.2s, background-color 0.2s;
        }
        @media (min-width: 768px) {
            .delete-btn {
                opacity: 0;
            }
            .card-container:hover .delete-btn {
                opacity: 1;
            }
        }
        .delete-btn:active {
            transform: scale(0.9);
            background-color: rgba(220, 38, 38, 0.8) !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 sticky top-0 z-20 bg-[#0f0f0f]/95 backdrop-blur-md border-b border-white/5 shadow-lg">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center text-sm font-bold shadow-lg shadow-blue-900/50" id="userAvatar">U</div>
                <h1 class="text-lg font-bold tracking-tight text-white">Мои Сериалы</h1>
            </div>
            <button onclick="clearAllData()" class="text-xs text-gray-500 hover:text-red-400 transition-colors">
                Сброс
            </button>
        </div>
        
        <div class="relative">
            <input type="text" id="searchInput" placeholder="Поиск (Ведьмак, Breaking Bad...)..." 
                class="w-full glass-input rounded-xl pl-4 pr-10 py-3 text-sm placeholder-gray-500 transition-all shadow-inner">
            
            <div id="searchLoader" class="absolute right-3 top-3 hidden">
                <div class="loader"></div>
            </div>

            <div id="searchResults" class="absolute top-full left-0 right-0 mt-2 bg-[#1a1a1a] border border-white/10 rounded-xl shadow-2xl max-h-64 overflow-y-auto z-50 hidden">
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pt-6 pb-24">
        
        <div id="emptyState" class="flex flex-col items-center justify-center h-64 text-gray-500 text-center px-6 hidden">
            <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <p class="text-sm">Ваш список пуст.<br>Введите название сериала в поиск сверху.</p>
        </div>

        <div id="showList" class="flex gap-4 px-4 pb-8 hide-scroll snap-x overflow-x-auto">
        </div>

        <div class="px-4 mt-2">
            <div class="bg-gradient-to-r from-gray-900 to-gray-800 border border-white/10 rounded-2xl p-4 flex items-center justify-between shadow-lg">
                <div class="overflow-hidden">
                    <p class="text-[10px] text-gray-400 uppercase tracking-wider font-bold mb-1">Ваша ссылка</p>
                    <p class="text-xs text-blue-400 truncate font-mono" id="profileLinkDisplay">Загрузка...</p>
                </div>
                <button onclick="shareProfile()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg shadow-blue-900/30">
                    Поделиться
                </button>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center pointer-events-none">
        <div class="modal-backdrop absolute inset-0 pointer-events-auto" onclick="closeModal()"></div>
        
        <div class="bg-[#1a1a1a] w-full sm:w-[400px] sm:rounded-3xl rounded-t-3xl p-6 max-h-[85vh] overflow-y-auto slide-up pointer-events-auto border-t border-white/10 relative">
            
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-6 opacity-50"></div>
            
            <div class="flex gap-5 mb-6">
                <img id="modalPoster" class="w-28 h-40 rounded-xl bg-gray-800 flex-shrink-0 object-cover shadow-2xl border border-white/10" src="" alt="Poster">
                <div class="flex-1 flex flex-col justify-center">
                    <h2 id="modalTitle" class="text-xl font-bold text-white leading-tight mb-1"></h2>
                    <p id="modalStudio" class="text-sm text-gray-400 mb-4 line-clamp-2"></p>
                    
                    <div class="flex items-center gap-3 mt-auto">
                        <div class="bg-green-500/10 text-green-400 px-3 py-1.5 rounded-lg text-sm font-bold border border-green-500/20 flex items-center gap-1">
                            <span id="modalRatingDisplay">--</span> 
                            <span class="text-xs opacity-60">/ 10</span>
                        </div>
                        <button onclick="enableEditRating()" class="text-xs text-gray-400 hover:text-white underline decoration-gray-600 underline-offset-2">Оценить</button>
                    </div>
                </div>
            </div>

            <div id="ratingInputContainer" class="mb-6 hidden bg-white/5 p-4 rounded-xl border border-white/5">
                <label class="block text-xs text-gray-400 mb-2 font-medium">Ваша оценка</label>
                <div class="flex gap-2">
                    <input type="number" id="ratingInput" step="0.1" min="0" max="10" class="glass-input w-full px-3 py-2 rounded-lg text-sm font-mono" placeholder="0.0 - 10.0">
                    <button onclick="saveRating()" class="bg-green-600 hover:bg-green-500 text-white px-4 rounded-lg text-sm font-bold transition-colors">OK</button>
                </div>
            </div>

            <div class="mb-24 sm:mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">Ваши впечатления</label>
                <textarea id="impressionsInput" rows="6" class="w-full glass-input rounded-xl p-4 text-sm resize-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="Напишите рецензию..."></textarea>
            </div>

            <div class="flex gap-3 mt-6 sticky bottom-0 bg-[#1a1a1a] pt-4 border-t border-white/5">
                <button onclick="saveImpressions()" class="flex-1 bg-white text-black py-3.5 rounded-xl font-bold text-sm hover:bg-gray-200 transition-colors">
                    Сохранить
                </button>
                <button onclick="closeModal()" class="flex-1 bg-gray-800 text-white py-3.5 rounded-xl font-bold text-sm hover:bg-gray-700 transition-colors">
                    Закрыть
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Словарь популярных сериалов (Русский → Английский) ---
        // Помогает искать русские названия через iTunes API
        const SHOW_TRANSLATIONS = {
            'ведьмак': 'The Witcher',
            'женщина халк': 'She-Hulk',
            'she-hulk': 'She-Hulk Attorney at Law',
            'мандалорец': 'The Mandalorian',
            'сыны анархии': 'Sons of Anarchy',
            'во все тяжкие': 'Breaking Bad',
            'лучше звоните солу': 'Better Call Saul',
            'очень странные дела': 'Stranger Things',
            'игра престолов': 'Game of Thrones',
            'дом дракона': 'House of the Dragon',
            'чернобыль': 'Chernobyl',
            'тьма': 'Dark',
            'офис': 'The Office',
            'друзья': 'Friends',
            'шерлок': 'Sherlock',
            'рик и морти': 'Rick and Morty',
            'игра в кальмара': 'Squid Game',
            'эйфория': 'Euphoria',
            'острые козырьки': 'Peaky Blinders',
            'черное зеркало': 'Black Mirror',
            'наследники': 'Succession',
            'белый лотос': 'The White Lotus',
            'американская история ужасов': 'American Horror Story',
            'ход мертвецов': 'The Walking Dead',
            'сверхъестественное': 'Supernatural',
            'клиник': 'Scrubs',
            'теория большого взрыва': 'The Big Bang Theory',
            'как я встретил вашу маму': 'How I Met Your Mother',
            'ферма': 'The Ranch',
            'бруклин 99': 'Brooklyn Nine-Nine',
            'парк юрского периода': 'Jurassic World Camp Cretaceous',
            'пацаны': 'The Boys',
            'приглашение': 'The Invitation',
            'винкс': 'Fate: The Winx Saga',
            'осень': 'Wednesday',
            'уэнсдей': 'Wednesday',
            '1899': '1899',
            'аркейн': 'Arcane',
            'песнь льда и пламени': 'Game of Thrones',
            'кольцо власти': 'The Lord of the Rings: The Rings of Power',
            'властелин колец': 'The Lord of the Rings: The Rings of Power',
            'обитель зла': 'Resident Evil',
            'стрела': 'Arrow',
            'флэш': 'The Flash',
            'супергёрл': 'Supergirl',
            'легенды завтрашнего дня': 'DC\'s Legends of Tomorrow',
            'титаны': 'Titans',
            'доктор кто': 'Doctor Who',
            'секретные материалы': 'The X-Files',
            'lost': 'Lost',
            'остаться в живых': 'Lost',
            'гавайи 50': 'Hawaii Five-0',
            'морская полиция': 'NCIS',
            'космос': 'Space: Above and Beyond',
            'звездный путь': 'Star Trek',
            'стартрек': 'Star Trek',
            'звездные войны': 'Star Wars',
            'американские боги': 'American Gods',
            'видоизмененный углерод': 'Altered Carbon',
            'любовь смерть и роботы': 'Love, Death & Robots',
            'санкта': 'Shadow and Bone',
            'тень и кость': 'Shadow and Bone',
            'ведьмак кошмар волка': 'The Witcher: Nightmare of the Wolf',
            'академия амбрелла': 'The Umbrella Academy',
            'озарк': 'Ozark',
            'корона': 'The Crown',
            'великая': 'The Great',
            'благие знамения': 'Good Omens',
            'сексуальное воспитание': 'Sex Education',
            'после жизни': 'After Life',
            'дикий': 'The Wilds',
            'бумажный дом': 'Money Heist',
            'ла casa de papel': 'Money Heist',
            'элита': 'Elite',
            'виктория': 'Victoria',
            'аббатство даунтон': 'Downton Abbey',
            'шрэм': 'Shameless',
            'пик слепых убийц': 'Peaky Blinders',
            'табу': 'Taboo',
            'ярость': 'Fury',
            'мир дикого запада': 'Westworld',
            'настоящий детектив': 'True Detective',
            'фарго': 'Fargo',
            'подпольная империя': 'Boardwalk Empire',
            'клан сопрано': 'The Sopranos',
            'прослушка': 'The Wire',
            'дедвуд': 'Deadwood',
            'романтики': 'The Romantics',
            'карточный домик': 'House of Cards',
            'оранжевый хит': 'Orange Is the New Black',
            'мыльные оперы': 'Soap',
            'рассказ служанки': 'The Handmaid\'s Tale',
            'рассказы из петли': 'Tales from the Loop',
            'маньяк': 'Maniac',
            'чернобыль зона отчуждения': 'Chernobyl Zone of Exclusion'
        };

        // --- Состояние приложения ---
        let state = {
            userId: null,
            shows: [],
            currentModalShowId: null
        };

        // --- Инициализация ---
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                
                const tgUser = window.Telegram.WebApp.initDataUnsafe?.user;
                if (tgUser && tgUser.id) {
                    state.userId = 'tg_' + tgUser.id;
                } else {
                    state.userId = 'web_' + Math.random().toString(36).substr(2, 9);
                }
            } else {
                state.userId = 'web_' + Math.random().toString(36).substr(2, 9);
            }
            
            loadUserData();
            
            document.getElementById('userAvatar').innerText = state.userId.slice(4, 6).toUpperCase();
            document.getElementById('profileLinkDisplay').innerText = `t.me/app?startapp=${state.userId}`;
            
            renderShowList();
            setupSearch();
        });

        function loadUserData() {
            const storageKey = `tma_shows_${state.userId}`;
            const saved = localStorage.getItem(storageKey);
            state.shows = saved ? JSON.parse(saved) : [];
        }

        function saveUserData() {
            const storageKey = `tma_shows_${state.userId}`;
            localStorage.setItem(storageKey, JSON.stringify(state.shows));
            renderShowList();
        }

        function clearAllData() {
            if(confirm('Удалить весь список сериалов?')) {
                state.shows = [];
                saveUserData();
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
                }
            }
        }

        // --- Логика Поиска ---
        function setupSearch() {
            const input = document.getElementById('searchInput');
            const resultsDiv = document.getElementById('searchResults');
            const loader = document.getElementById('searchLoader');
            let timeoutId = null;

            input.addEventListener('input', (e) => {
                const val = e.target.value.trim();
                
                if (timeoutId) clearTimeout(timeoutId);

                if (val.length < 2) {
                    resultsDiv.classList.add('hidden');
                    return;
                }

                timeoutId = setTimeout(() => {
                    performSearch(val);
                }, 600);
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.relative')) {
                    resultsDiv.classList.add('hidden');
                }
            });
        }

        async function performSearch(query) {
            const resultsDiv = document.getElementById('searchResults');
            const loader = document.getElementById('searchLoader');
            
            loader.classList.remove('hidden');
            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('hidden');

            try {
                // Проверяем словарь переводов для русских названий
                const lowerQuery = query.toLowerCase();
                let searchTerms = [query];
                
                // Если нашли русский перевод - добавляем английский термин
                for (const [ru, en] of Object.entries(SHOW_TRANSLATIONS)) {
                    if (lowerQuery.includes(ru)) {
                        searchTerms.push(en);
                        break;
                    }
                }

                // Ищем по всем терминам
                const allResults = [];
                const seenIds = new Set();

                for (const term of searchTerms) {
                    const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&media=tvShow&limit=50&entity=tvSeason`);
                    const data = await response.json();
                    
                    if (data.resultCount > 0) {
                        data.results.forEach(item => {
                            // Группировка по collectionId (уникальный ID сериала, не сезона)
                            if (item.collectionId && !seenIds.has(item.collectionId)) {
                                seenIds.add(item.collectionId);
                                allResults.push(item);
                            }
                        });
                    }
                }
                
                loader.classList.add('hidden');
                resultsDiv.innerHTML = '';

                if (allResults.length === 0) {
                    resultsDiv.innerHTML = '<div class="p-4 text-center text-sm text-gray-400">Ничего не найдено 😔<br><span class="text-xs opacity-60">Попробуйте английское название</span></div>';
                    return;
                }

                allResults.slice(0, 25).forEach(show => {
                    const uniqueId = show.collectionId;
                    const exists = state.shows.find(s => s.id === uniqueId);
                    
                    const btnText = exists ? 'В списке' : 'Добавить';
                    const btnClass = exists ? 'bg-gray-700 text-gray-400 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-500 shadow-lg shadow-blue-900/20';
                    const disabled = exists ? 'disabled' : '';

                    let posterUrl = 'https://via.placeholder.com/300x450?text=No+Image';
                    if (show.artworkUrl100) {
                        posterUrl = show.artworkUrl100.replace('100x100bb', '600x600bb');
                    }

                    const item = document.createElement('div');
                    item.className = 'flex items-center gap-3 p-3 border-b border-white/5 hover:bg-white/5 transition-colors cursor-pointer last:border-0';
                    item.innerHTML = `
                        <img src="${posterUrl}" class="w-12 h-16 rounded bg-gray-800 object-cover shadow-md flex-shrink-0" onerror="this.src='https://via.placeholder.com/150x220?text=Error'">
                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-sm truncate text-white leading-tight mb-1">${show.collectionName}</div>
                            <div class="text-xs text-gray-400 truncate">${show.artistName || 'Unknown'}</div>
                        </div>
                        <button ${disabled} onclick="addShowFromApi(${uniqueId}, '${show.collectionName.replace(/'/g, "\\'")}', '${(show.artistName || 'Unknown').replace(/'/g, "\\'")}', '${posterUrl}')" class="px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide transition-all whitespace-nowrap ${btnClass}">
                            ${btnText}
                        </button>
                    `;
                    resultsDiv.appendChild(item);
                });
            } catch (error) {
                console.error(error);
                loader.classList.add('hidden');
                resultsDiv.innerHTML = '<div class="p-3 text-sm text-red-400 text-center">Ошибка сети. Проверьте интернет.</div>';
            }
        }

        function addShowFromApi(id, title, studio, posterUrl) {
            if (!state.shows.find(s => s.id === id)) {
                state.shows.push({
                    id: id,
                    title: title,
                    studio: studio,
                    posterUrl: posterUrl,
                    rating: null,
                    impressions: ''
                });
                saveUserData();
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').classList.add('hidden');
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }
            }
        }

        function removeShow(e, id) {
            e.stopPropagation();
            
            if(confirm('Удалить этот сериал из списка?')) {
                state.shows = state.shows.filter(s => s.id !== id);
                saveUserData();
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
                }
            }
        }

        function renderShowList() {
            const container = document.getElementById('showList');
            const emptyState = document.getElementById('emptyState');
            
            container.innerHTML = '';

            if (state.shows.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            state.shows.forEach(show => {
                const card = document.createElement('div');
                card.className = 'card-container snap-center flex-shrink-0 w-36 bg-[#1a1a1a] rounded-2xl overflow-hidden shadow-lg border border-white/5 relative group transition-transform hover:scale-[1.03] active:scale-95 duration-200';
                
                const ratingDisplay = show.rating 
                    ? `<span class="text-yellow-400 font-bold text-sm">${show.rating}</span>` 
                    : '<span class="text-gray-600 font-bold text-sm">--</span>';

                card.innerHTML = `
                    <button onclick="removeShow(event, ${show.id})" class="delete-btn absolute top-2 right-2 z-10 bg-black/60 hover:bg-red-600 text-white rounded-full p-1.5 backdrop-blur-sm transition-colors border border-white/10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>

                    <div class="h-52 bg-gray-800 relative overflow-hidden" onclick="openModal(${show.id})">
                        <img src="${show.posterUrl}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity" alt="${show.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#1a1a1a] via-transparent to-transparent"></div>
                        
                        <div class="absolute bottom-3 right-3 bg-black/70 backdrop-blur-md px-2 py-1 rounded-md border border-white/10 shadow-lg">
                            ${ratingDisplay}
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-sm text-white leading-tight mb-1 line-clamp-2 h-10" title="${show.title}">${show.title}</h3>
                        <p class="text-[10px] text-gray-500 uppercase tracking-wider truncate mb-3">${show.studio}</p>
                        <button onclick="openModal(${show.id})" class="w-full py-2 bg-white/5 hover:bg-white/10 text-[10px] font-bold uppercase tracking-wide rounded-lg transition-colors text-center text-gray-300">
                            Открыть
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openModal(id) {
            const show = state.shows.find(s => s.id === id);
            if (!show) return;

            state.currentModalShowId = id;

            document.getElementById('modalPoster').src = show.posterUrl;
            document.getElementById('modalTitle').innerText = show.title;
            document.getElementById('modalStudio').innerText = show.studio;
            document.getElementById('modalRatingDisplay').innerText = show.rating ? show.rating : '--';
            document.getElementById('impressionsInput').value = show.impressions || '';
            
            document.getElementById('ratingInputContainer').classList.add('hidden');
            
            const modal = document.getElementById('detailModal');
            modal.classList.remove('hidden');
            
            if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.selectionChanged();
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            state.currentModalShowId = null;
        }

        function enableEditRating() {
            const container = document.getElementById('ratingInputContainer');
            const input = document.getElementById('ratingInput');
            const show = state.shows.find(s => s.id === state.currentModalShowId);
            
            input.value = show.rating || '';
            container.classList.remove('hidden');
            input.focus();
        }

        function saveRating() {
            const input = document.getElementById('ratingInput');
            let val = parseFloat(input.value);
            
            if (isNaN(val)) val = 0;
            if (val < 0) val = 0;
            if (val > 10) val = 10;

            val = Math.round(val * 10) / 10;

            const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
            if (showIndex !== -1) {
                state.shows[showIndex].rating = val;
                saveUserData();
                document.getElementById('modalRatingDisplay').innerText = val;
                document.getElementById('ratingInputContainer').classList.add('hidden');
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            }
        }

        function saveImpressions() {
            const text = document.getElementById('impressionsInput').value;
            const showIndex = state.shows.findIndex(s => s.id === state.currentModalShowId);
            
            if (showIndex !== -1) {
                state.shows[showIndex].impressions = text;
                saveUserData();
                
                if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            }
        }

        function shareProfile() {
            const link = `https://t.me/your_bot_name?startapp=${state.userId}`;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => {
                    if(window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.showAlert('Ссылка скопирована!');
                    } else {
                        alert('Ссылка скопирована!');
                    }
                });
            } else {
                window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Зацени мой список сериалов!`, '_blank');
            }
        }
    </script>
</body>
</html>
